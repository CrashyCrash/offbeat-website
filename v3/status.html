    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap');

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #020206;
            --bg-card: #08090f;
            --border: #141828;
            --glow: #00ccff;
            --glow-2: #00fff2;
            --violet: #7c3aed;
            --hot: #ff3d71;
            --green: #00e676;
            --text: #e6eaf4;
            --text-2: #6e7599;
            --text-3: #2d3150;
        }

        html { scroll-behavior: smooth; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
        }

        .mesh-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background:
                radial-gradient(ellipse 800px 600px at 20% 20%, rgba(0, 204, 255, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse 600px 800px at 80% 70%, rgba(124, 58, 237, 0.04) 0%, transparent 50%);
        }

        .scanlines {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 204, 255, 0.008) 2px,
                rgba(0, 204, 255, 0.008) 4px
            );
        }

        header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            padding: 1.5rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(2, 2, 6, 0.75);
            backdrop-filter: blur(20px);
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            position: relative;
            text-decoration: none;
            color: var(--text);
        }

        .brand svg {
            width: 120px;
            height: 32px;
            display: block;
        }

        .brand::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--glow), var(--violet));
            animation: brand-line 3s ease-in-out infinite alternate;
        }

        @keyframes brand-line {
            0% { transform: scaleX(0.3); transform-origin: left; }
            100% { transform: scaleX(1); transform-origin: left; }
        }

        .header-nav {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .header-nav a {
            color: var(--text-2);
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 500;
            transition: color 0.3s;
        }

        .header-nav a:hover { color: var(--glow); }
        .header-nav .active { color: var(--glow); }

        /* Page container */
        .page {
            position: relative;
            z-index: 1;
            padding: 9rem 2rem 6rem;
            max-width: 1100px;
            margin: 0 auto;
        }

        .page-label {
            font-family: 'Fira Code', monospace;
            font-size: 0.75rem;
            color: var(--glow);
            letter-spacing: 0.25em;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        .page-title {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 0.75rem;
        }

        .page-title span {
            background: linear-gradient(135deg, var(--glow), var(--glow-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-sub {
            color: var(--text-2);
            font-size: 1.05rem;
            margin-bottom: 0.5rem;
        }

        .last-updated {
            font-family: 'Fira Code', monospace;
            font-size: 0.72rem;
            color: var(--text-3);
            margin-bottom: 3.5rem;
        }

        /* Overall status banner */
        .overall-status {

            align-items: center;
            gap: 1rem;
            background: rgba(0, 230, 118, 0.06);
            border: 1px solid rgba(0, 230, 118, 0.2);

            padding: 1.25rem 1.75rem;
            margin-bottom: 3rem;
        }

            height: 14px;
