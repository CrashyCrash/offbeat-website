        html { scroll-behavior: smooth; }

        /* Animated mesh gradient background */
        .mesh-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background:
                radial-gradient(ellipse 800px 600px at 20% 20%, rgba(0, 204, 255, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse 600px 800px at 80% 70%, rgba(124, 58, 237, 0.04) 0%, transparent 50%);
        }

        /* Scanline effect */
        .scanlines {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 204, 255, 0.008) 2px,
                rgba(0, 204, 255, 0.008) 4px
            );
        }

        /* Nav */
        .announcement-banner {
            position: fixed;

            align-items: center;
            justify-content: space-between;
            gap: 1rem;

        .announcement-text span { color: var(--glow-2); }

        .announcement-dismiss {
            appearance: none;
            border: 1px solid rgba(0, 212, 255, 0.35);
            background: rgba(0, 212, 255, 0.08);
            color: #d9f7ff;
            border-radius: 7px;
            width: 26px;
            height: 26px;
            font-size: 0.9rem;
            line-height: 1;
            cursor: pointer;
            transition: border-color 0.2s ease, background-color 0.2s ease, color 0.2s ease;
            transform: none;
            flex: 0 0 auto;
        }

        .announcement-dismiss:hover,
        .announcement-dismiss:focus-visible {
            border-color: rgba(0, 212, 255, 0.55);
            background: rgba(0, 212, 255, 0.16);
            color: #ffffff;
            transform: none;
        }

        body.announcement-dismissed {
            --announcement-offset: 0px;
        }

        body.announcement-dismissed .announcement-banner {
            display: none;
        }
