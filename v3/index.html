    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Fira+Code:wght@500&display=swap');

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #020206;
            --bg-card: #08090f;
            --border: #141828;
            --glow: #00ccff;
            --glow-2: #00fff2;
            --violet: #7c3aed;
            --hot: #ff3d71;
            --green: #00e676;
            --text: #e6eaf4;
            --text-2: #6e7599;
            --text-3: #2d3150;
            --announcement-offset: 40px;
        }

        body.light-mode {
            --bg: #f8f8fc;
            --bg-card: #e8e8f0;
            --text: #1a1a1a;
            --text-2: #4a4a4a;
        }

        .skip-link {
            position: absolute;
            left: -9999px;
            z-index: 999;
            background: var(--glow);
            color: var(--bg);
            padding: 0.5rem 1rem;
            text-decoration: none;
            font-weight: 700;
        }
        .skip-link:focus {
            position: static;
        }

        #theme-toggle {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 1000;
            cursor: pointer;
            background: none;
            border: none;
            padding: 5px;
            color: var(--text);
            width: 20px;
            height: 20px;
        }

        html { scroll-behavior: smooth; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        /* Metrics Bar */
        .metrics-bar {
            display: flex;
            justify-content: space-around;
            padding: 2rem;
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            margin: 2rem 0;
        }
        .metric-block {
            text-align: center;
        }
        .metric-number {
            display: block;
            font-family: 'Fira Code', monospace;
            font-size: 2rem;
            font-weight: 700;
            color: var(--glow);
            margin-bottom: 0.25rem;
        }
        .metric-subtext {
            font-size: 0.85rem;
            color: var(--text-2);
            text-transform: uppercase;
        }

        /* Stats Row */
        .stats-row {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 2rem 0;
            flex-wrap: wrap;
        }
        .stat-item {
            text-align: center;
        }
        .stat-value {
            display: block;
            font-family: 'Fira Code', monospace;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--glow), var(--glow-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-label {
            font-size: 0.75rem;
            color: var(--text-2);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Powered By Section */
        .powered-by {
            padding: 2rem 1rem;
            text-align: center;
        }
        .powered-by h3 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-2);
            margin-bottom: 1.5rem;
        }
        .tech-stack {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.75rem;
        }
        .tech-pill {
            padding: 0.4rem 1rem
