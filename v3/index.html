        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #020206;
            --bg-card: #08090f;
            --border: #141828;
            --glow: #00ccff;
            --glow-2: #00fff2;
            --violet: #7c3aed;
            --hot: #ff3d71;
            --green: #00e676;

            --text-3: #2d3150;
            --announcement-offset: 40px;
        }

        html { scroll-behavior: smooth; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        /* Powered By Section */
        .powered-by {
            padding: 2rem 1rem;
            text-align: center;
        }
        .powered-by h3 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-2);
            margin-bottom: 1.5rem;
        }
        .tech-stack {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.75rem;
        }
        .tech-pill {
            padding: 0.4rem 1rem;
            background: rgba(124, 58, 237, 0.1);
            border: 1px solid rgba(0, 204, 255, 0.2);
            border-radius: 50px;
            font-size: 0.85rem;
            color: var(--text);
            transition: none;
        }

        /* Animated mesh gradient background */
        .mesh-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background:
                radial-gradient(ellipse 800px 600px at 20% 20%, rgba(0, 204, 255, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse 600px 800px at 80% 70%, rgba(124, 58, 237, 0.04) 0%, transparent 50%);
        }

        /* Scanline effect */
        .scanlines {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 204, 255, 0.008) 2px,
                rgba(0, 204, 255, 0.008) 4px
            );
        }

                rgba(0, 212, 255, 0.06) 45%,
                rgba(0, 212, 255, 0.15) 100%
            );

        }
