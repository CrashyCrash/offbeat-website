@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap');

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #020206;
            --bg-card: #08090f;
            --border: #141828;
            --glow: #00ccff;
            --glow-2: #00fff2;
            --violet: #7c3aed;
            --hot: #ff3d71;
            --green: #00e676;
            --text: #e6eaf4;
            --text-2: #6e7599;
            --text-3: #2d3150;
        }

        html { scroll-behavior: smooth; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        .mesh-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background:
                radial-gradient(ellipse 800px 600px at 20% 20%, rgba(0, 204, 255, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse 600px 800px at 80% 70%, rgba(124, 58, 237, 0.04) 0%, transparent 50%);
        }

        .scanlines {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 204, 255, 0.008) 2px,
                rgba(0, 204, 255, 0.008) 4px
            );
        }

        header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            padding: 1.5rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(2, 2, 6, 0.75);
            backdrop-filter: blur(20px);
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            position: relative;
            color: #fff;
            text-decoration: none;
        }

        .brand svg {
            width: 120px;
            height: 32px;
            display: block;
        }

        .brand::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--glow), var(--violet));
            animation: brand-line 3s ease-in-out infinite alternate;
        }

        @keyframes brand-line {
            0% { transform: scaleX(0.3); transform-origin: left; }
            100% { transform: scaleX(1); transform-origin: left; }
        }

        .header-nav {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .header-nav a {
            color: var(--text-2);
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 500;
            transition: color 0.3s;
        }

        .header-nav a:hover { color: var(--glow); }
        .header-nav .active { color: var(--glow); }

        .section {
            position: relative;
            z-index: 1;
            padding: 7rem 2rem 2rem;
        }

        .wrap { max-width: 1100px; margin: 0 auto; }

        .tag-line {
            font-family: 'Fira Code', monospace;
            font-size: 0.72rem;
            color: var(--glow);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 0.75rem;
            text-align: center;
        }

        h1 {
            font-size: clamp(2.4rem, 6vw, 4rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.15;
            margin-bottom: 0.75rem;
            text-align: center;
        }

        .sub {
            color: var(--text-2);
            font-size: 1.05rem;
            line-height: 1.7;
            max-width: 550px;
            margin: 0 auto 3.5rem;
            text-align: center;
        }

        .affiliate-badge {
            display: inline-block;
            font-family: 'Fira Code', monospace;
            font-size: 0.72rem;
            color: var(--glow);
            border: 1px solid rgba(0, 204, 255, 0.35);
            border-radius: 999px;
            padding: 0.4rem 0.9rem;
            margin-bottom: 2rem;
        }

        .category-block {
            margin-bottom: 4rem;
        }

        .category-title {
            font-family: 'Fira Code', monospace;
            font-size: 1rem;
            color: var(--glow);
            text-transform: uppercase;
            letter-spacing: 0.18em;
            margin-bottom: 1.2rem;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .product-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem 1.5rem 1.5rem;
            position: relative;
            transition: all 0.5s;
            display: flex;
            flex-direction: column;
            min-height: 180px;
        }
