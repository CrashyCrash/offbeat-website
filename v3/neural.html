<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="DatBotty Pulse — live neural network visualization of Offbeat's autonomous AI system.">
    <meta property="og:title" content="DatBotty Pulse — Offbeat, Inc.">
    <meta property="og:description" content="A real-time neural visualization of DatBotty, the autonomous AI powering Offbeat, Inc.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://crashycrash.github.io/offbeat-website/v3/neural.html">
    <link rel="canonical" href="https://crashycrash.github.io/offbeat-website/v3/neural.html">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "DatBotty Pulse",
      "url": "https://crashycrash.github.io/offbeat-website/v3/neural.html",
      "description": "Live neural network visualization of DatBotty autonomous AI system.",
      "isPartOf": {
        "@type": "WebSite",
        "name": "Offbeat, Inc.",
        "url": "https://crashycrash.github.io/offbeat-website/v3/"
      }
    }
    </script>
    <title>DatBotty Pulse — Offbeat, Inc.</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap');

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #020206;
            --bg-card: #08090f;
            --border: #141828;
            --glow: #00ccff;
            --glow-2: #00fff2;
            --violet: #7c3aed;
            --hot: #ff3d71;
            --green: #00e676;
            --text: #e6eaf4;
            --text-2: #6e7599;
            --text-3: #2d3150;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        canvas#neural {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 0;
        }

        /* Scanlines overlay */
        .scanlines {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 204, 255, 0.006) 2px,
                rgba(0, 204, 255, 0.006) 4px
            );
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 10;
            padding: 1.2rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(2, 2, 6, 0.6);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(0, 204, 255, 0.08);
        }

        .brand {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-decoration: none;
            color: var(--text);
            position: relative;
        }

        .brand::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--glow), var(--violet));
            animation: brand-line 3s ease-in-out infinite alternate;
        }

        @keyframes brand-line {
            0% { transform: scaleX(0.3); transform-origin: left; }
            100% { transform: scaleX(1); transform-origin: left; }
        }

        .header-title {
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            color: var(--glow);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            opacity: 0.85;
        }

        .header-nav {
            display: flex;
            gap: 1.8rem;
            list-style: none;
        }

        .header-nav a {
            color: var(--text-2);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.3s;
        }

        .header-nav a:hover { color: var(--glow); }
        .header-nav .active { color: var(--glow); }

        /* HUD panels */
        .hud {
            position: fixed;
            z-index: 5;
            font-family: 'Fira Code', monospace;
            font-size: 0.75rem;
            pointer-events: none;
        }

        .hud-panel {
            background: rgba(2, 2, 6, 0.72);
            border: 1px solid rgba(0, 204, 255, 0.18);
            border-radius: 4px;
            padding: 0.9rem 1.2rem;
            backdrop-filter: blur(16px);
            line-height: 1.9;
            min-width: 200px;
            box-shadow: 0 0 30px rgba(0, 204, 255, 0.05), inset 0 0 20px rgba(0, 0, 0, 0.3);
        }

        .hud-label {
            color: var(--text-2);
            font-size: 0.65rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 0.4rem;
            border-bottom: 1px solid rgba(0, 204, 255, 0.1);
            padding-bottom: 0.3rem;
        }

        .hud-val {
            color: var(--glow);
            font-weight: 500;
        }

        .hud-val-violet { color: #a78bfa; }
        .hud-val-green { color: var(--green); }
        .hud-val-hot { color: var(--hot); }

        .hud-tl {
            top: 5.5rem;
            left: 1.5rem;
        }

        .hud-tr {
            top: 5.5rem;
            right: 1.5rem;
            text-align: right;
        }

        /* Ticker */
        .ticker-wrap {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 5;
            background: rgba(2, 2, 6, 0.72);
            border-top: 1px solid rgba(0, 204, 255, 0.1);
            backdrop-filter: blur(16px);
            overflow: hidden;
            height: 2.4rem;
            display: flex;
            align-items: center;
        }

        .ticker-label {
            font-family: 'Fira Code', monospace;
            font-size: 0.65rem;
            color: var(--glow);
            letter-spacing: 0.12em;
            padding: 0 1.2rem;
            white-space: nowrap;
            border-right: 1px solid rgba(0, 204, 255, 0.2);
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .ticker-track {
            display: flex;
            white-space: nowrap;
            animation: ticker-scroll 28s linear infinite;
            font-family: 'Fira Code', monospace;
            font-size: 0.7rem;
            color: var(--text-2);
        }

        .ticker-track span {
            padding: 0 2rem;
        }

        .ticker-track span::before {
            content: '▸ ';
            color: var(--green);
        }

        @keyframes ticker-scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* Tooltip */
        #tooltip {
            position: fixed;
            z-index: 20;
            pointer-events: none;
            font-family: 'Fira Code', monospace;
            font-size: 0.72rem;
            background: rgba(2, 2, 6, 0.9);
            border: 1px solid rgba(0, 204, 255, 0.3);
            border-radius: 4px;
            padding: 0.5rem 0.85rem;
            color: var(--text);
            line-height: 1.7;
            display: none;
            box-shadow: 0 0 20px rgba(0, 204, 255, 0.15);
        }

        #tooltip .tt-name {
            color: var(--glow);
            font-weight: 500;
            font-size: 0.78rem;
        }

        #tooltip .tt-status-ok { color: var(--green); }
        #tooltip .tt-status-warn { color: var(--hot); }

        /* Live dot pulsing */
        .live-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
            margin-right: 5px;
            vertical-align: middle;
            animation: live-pulse 1.6s ease-in-out infinite;
        }

        @keyframes live-pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 4px var(--green); }
            50% { opacity: 0.4; box-shadow: none; }
        }

        /* Mobile nav hide */
        @media (max-width: 600px) {
            .header-nav { display: none; }
            .hud-panel { min-width: 140px; font-size: 0.68rem; padding: 0.6rem 0.85rem; }
        }
    </style>
</head>

<!-- HUD Top-Left -->

<!-- Tooltip -->
<div id="tooltip"></div>

<script>
(function () {
    'use strict';

    // ─── Demo / fallback data ────────────────────────────────────────────────
    const DEMO = {
        tasks_completed: 247,
        quality_avg: 0.41,
        uptime_hours: 108,
        active_nodes: 8,
        total_nodes: 8,
        last_briefing: '2h ago',
        recent_tasks: [
            'Web research completed',
            'Daily briefing sent',
            'Link audit passed',
            'Skill registry updated',
            'Task queue flushed',
            'Orchestrator run OK',
            'Memory context stored',
            'Telegram Q&A: ok',
            'Browser task done',
            'Quality score logged'
        ]
    };

    // ─── Color palette ───────────────────────────────────────────────────────
    const C = {
        bg:     '#020206',
        glow:   '#00ccff',
        glow2:  '#00fff2',
        violet: '#7c3aed',
        hot:    '#ff3d71',
        green:  '#00e676',
        text:   '#e6eaf4',
        text2:  '#6e7599',
    };

    // ─── Node definitions ────────────────────────────────────────────────────
    const NODE_DEFS = [
        { id: 'datbotty',    label: 'DatBotty',    color: C.glow,   radius: 38, isCenter: true,  status: 'CORE ONLINE',     statusOk: true  },
        { id: 'openclaw',    label: 'OpenClaw',    color: C.glow,   radius: 22, orbitIdx: 0, orbitR: 0,   status: 'RUNNING',         statusOk: true  },
        { id: 'telegram',    label: 'Telegram',    color: C.violet, radius: 18, orbitIdx: 1, orbitR: 0,   status: 'POLLING',         statusOk: true  },
        { id: 'browser',     label: 'Browser',     color: C.glow2,  radius: 18, orbitIdx: 2, orbitR: 0,   status: 'READY',           statusOk: true  },
        { id: 'briefing',    label: 'Briefing',    color: C.violet, radius: 18, orbitIdx: 3, orbitR: 0,   status: '3x/DAY',          statusOk: true  },
        { id: 'orchestrator',label: 'Orchestrator',color: C.hot,    radius: 20, orbitIdx: 4, orbitR: 0,   status: '4x/DAY',          statusOk: true  },
        { id: 'skills',      label: 'Skills',      color: C.green,  radius: 17, orbitIdx: 5, orbitR: 0,   status: '13 ACTIVE',       statusOk: true  },
        { id: 'github',      label: 'GitHub',      color: '#a78bfa',radius: 18, orbitIdx: 6, orbitR: 0,   status: 'SYNCED',          statusOk: true  },
        { id: 'database',    label: 'Database',    color: C.green,  radius: 17, orbitIdx: 7, orbitR: 0,   status: 'HEALTHY',         statusOk: true  },
    ];

    // connections: [from, to]
    const CONNECTIONS = [
        ['datbotty','openclaw'],['datbotty','telegram'],['datbotty','browser'],
        ['datbotty','briefing'],['datbotty','orchestrator'],['datbotty','skills'],
        ['datbotty','github'],['datbotty','database'],
        ['openclaw','skills'],['orchestrator','database'],['briefing','telegram'],
        ['github','orchestrator'],['browser','database'],
    ];

    // ─── Canvas setup ────────────────────────────────────────────────────────
    const canvas = document.getElementById('neural');
    const ctx = canvas.getContext('2d');
    let W, H, cx, cy;

    function resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        W = canvas.offsetWidth;
        H = canvas.offsetHeight;
        canvas.width  = W * dpr;
        canvas.height = H * dpr;
        ctx.scale(dpr, dpr);
        cx = W / 2;
        cy = H / 2;
        initNodes();
    }

    // ─── Node state ─────────────────────────────────────────────────────────
    const nodes = {};
    let orbitRadius = 200;

    function initNodes() {
        const minDim = Math.min(W, H);
        orbitRadius = minDim * 0.28;
        const satelliteCount = 8;

        NODE_DEFS.forEach(def => {
            if (def.isCenter) {
                nodes[def.id] = {
                    ...def, x: cx, y: cy,
                    angle: 0, pulsePhase: 0, hovered: false,
                    baseRadius: def.radius, curRadius: def.radius,
                };
            } else {
                const baseAngle = (def.orbitIdx / satelliteCount) * Math.PI * 2;
                nodes[def.id] = {
                    ...def,
                    angle: baseAngle,
                    orbitSpeed: 0.00008 + def.orbitIdx * 0.000012,
                    orbitEccentricity: 0.08 + (def.orbitIdx % 3) * 0.04,
                    pulsePhase: (def.orbitIdx / satelliteCount) * Math.PI * 2,
                    x: cx + Math.cos(baseAngle) * orbitRadius,
                    y: cy + Math.sin(baseAngle) * orbitRadius,
                    hovered: false,
                    baseRadius: def.radius, curRadius: def.radius,
                };
            }
        });
    }

    // ─── Ambient particle field ──────────────────────────────────────────────
    const PARTICLE_COUNT = 260;
    const particles = [];

    function initParticles() {
        particles.length = 0;
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            particles.push({
                x:   Math.random() * W,
                y:   Math.random() * H,
                vx:  (Math.random() - 0.5) * 0.3,
                vy:  (Math.random() - 0.5) * 0.3,
                r:   Math.random() * 1.2 + 0.3,
                a:   Math.random() * 0.5 + 0.1,
                colorIdx: Math.floor(Math.random() * 3),
            });
        }
    }

    const PCOLORS = [C.glow, C.violet, C.green];

    // ─── Stream particles (travel along connections) ─────────────────────────
    const MAX_STREAM = 80;
    const streams = [];
    let streamTimer = 0;

    function spawnStream() {
        const conn = CONNECTIONS[Math.floor(Math.random() * CONNECTIONS.length)];
        const [fromId, toId] = Math.random() > 0.5 ? conn : [conn[1], conn[0]];
        const from = nodes[fromId];
        const to   = nodes[toId];
        if (!from || !to) return;
        streams.push({
            fromId, toId,
            t: 0,
            speed: 0.004 + Math.random() * 0.006,
            color: from.color,
            r: 2.2 + Math.random() * 1.5,
        });
    }

    // ─── Pulse wave state ────────────────────────────────────────────────────
    const pulseWaves = [];
    let pulseTimer = 0;

    function spawnPulse() {
        pulseWaves.push({ r: 0, maxR: orbitRadius * 1.6, alpha: 0.6, born: performance.now() });
    }

    // ─── Data loading ────────────────────────────────────────────────────────
    let data = { ...DEMO };

    function applyData(d) {
        data = d;
        document.getElementById('hud-tasks').textContent = d.tasks_completed;
        document.getElementById('hud-quality').textContent = d.quality_avg.toFixed(2);
        const h = Math.floor(d.uptime_hours);
        const days = Math.floor(h / 24), hrs = h % 24;
        document.getElementById('hud-uptime').textContent = `${days}d ${hrs}h`;
        document.getElementById('hud-nodes').textContent  = `${d.active_nodes}/${d.total_nodes}`;
        document.getElementById('hud-brief').textContent  = d.last_briefing;
        buildTicker(d.recent_tasks);
    }

    function buildTicker(tasks) {
        const el = document.getElementById('ticker');
        // duplicate for seamless loop
        const all = [...tasks, ...tasks];
        el.innerHTML = all.map(t => `<span>${t}</span>`).join('');
    }

    fetch('neural-data.json')
        .then(r => r.ok ? r.json() : Promise.reject())
        .then(applyData)
        .catch(() => applyData(DEMO));

    // ─── Tooltip ─────────────────────────────────────────────────────────────
    const tooltip = document.getElementById('tooltip');
    let mouseX = -999, mouseY = -999;
    let hoveredNode = null;

    canvas.addEventListener('mousemove', e => {
        const rect = canvas.getBoundingClientRect();
        mouseX = e.clientX - rect.left;
        mouseY = e.clientY - rect.top;
    });

    canvas.addEventListener('mouseleave', () => {
        mouseX = -999; mouseY = -999;
        tooltip.style.display = 'none';
        hoveredNode = null;
    });

    function updateHover() {
        let found = null;
        for (const id in nodes) {
            const n = nodes[id];
            const dx = mouseX - n.x, dy = mouseY - n.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < n.curRadius + 12) { found = id; break; }
        }

        // update glow state
        for (const id in nodes) nodes[id].hovered = (id === found);

        if (found) {
            const n = nodes[found];
            tooltip.innerHTML = `<div class="tt-name">${n.label}</div><div class="${n.statusOk ? 'tt-status-ok' : 'tt-status-warn'}">${n.statusOk ? '● ' : '⚠ '}${n.status}</div>`;
            const tx = mouseX + 16, ty = mouseY - 10;
            tooltip.style.left = Math.min(tx, W - 180) + 'px';
            tooltip.style.top  = Math.max(ty, 60) + 'px';
            tooltip.style.display = 'block';
            hoveredNode = found;
        } else {
            tooltip.style.display = 'none';
            hoveredNode = null;
        }
    }

    // ─── Helpers ─────────────────────────────────────────────────────────────
    function hexToRgb(hex) {
        const r = parseInt(hex.slice(1,3),16);
        const g = parseInt(hex.slice(3,5),16);
        const b = parseInt(hex.slice(5,7),16);
        return `${r},${g},${b}`;
    }

    const rgbCache = {};
    function rgb(hex) {
        if (!rgbCache[hex]) rgbCache[hex] = hexToRgb(hex);
        return rgbCache[hex];
    }

    // bezier midpoint helper
    function getBezierPoint(t, ax, ay, bx, by) {
        // control point: perpendicular offset from midpoint
        const mx = (ax + bx) / 2, my = (ay + by) / 2;
        const dx = bx - ax, dy = by - ay;
        const len = Math.sqrt(dx*dx + dy*dy);
        const nx = -dy / len, ny = dx / len;
        const offset = len * 0.25;
        const cpx = mx + nx * offset, cpy = my + ny * offset;
        const u = 1 - t;
        return {
            x: u*u*ax + 2*u*t*cpx + t*t*bx,
            y: u*u*ay + 2*u*t*cpy + t*t*by,
        };
    }

    function getControlPoint(ax, ay, bx, by) {
        const mx = (ax + bx) / 2, my = (ay + by) / 2;
        const dx = bx - ax, dy = by - ay;
        const len = Math.sqrt(dx*dx + dy*dy) || 1;
        const nx = -dy / len, ny = dx / len;
        const offset = len * 0.22;
        return { cpx: mx + nx * offset, cpy: my + ny * offset };
    }

    // glow draw helper
    function drawGlowCircle(cx_, cy_, r, color, alpha, blur) {
        const grad = ctx.createRadialGradient(cx_, cy_, 0, cx_, cy_, r + blur);
        grad.addColorStop(0,   `rgba(${rgb(color)},${Math.min(alpha,1)})`);
        grad.addColorStop(0.4, `rgba(${rgb(color)},${Math.min(alpha*0.6,1)})`);
        grad.addColorStop(1,   `rgba(${rgb(color)},0)`);
        ctx.beginPath();
        ctx.arc(cx_, cy_, r + blur, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
    }

    // ─── Draw functions ──────────────────────────────────────────────────────

    function drawAmbientParticles() {
        particles.forEach(p => {
            p.x += p.vx; p.y += p.vy;
            if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
            if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
            ctx.fillStyle = `rgba(${rgb(PCOLORS[p.colorIdx])},${p.a})`;
            ctx.fill();
        });
    }

    function drawConnections(t) {
        CONNECTIONS.forEach(([fromId, toId]) => {
            const from = nodes[fromId], to = nodes[toId];
            if (!from || !to) return;
            const { cpx, cpy } = getControlPoint(from.x, from.y, to.x, to.y);

            // heartbeat pulse on connections
            const phaseDiff = (from.pulsePhase + to.pulsePhase) * 0.5;
            const pulse = 0.5 + 0.5 * Math.sin(t * 0.0015 + phaseDiff);

            const isHighlit = from.hovered || to.hovered;
            const baseAlpha = isHighlit ? 0.55 : 0.18;
            const lineAlpha = baseAlpha + pulse * 0.15;

            // use the 'from' color for gradient start
            const fromColor = from.isCenter ? C.glow : from.color;
            const toColor   = to.isCenter   ? C.glow : to.color;

            const grad = ctx.createLinearGradient(from.x, from.y, to.x, to.y);
            grad.addColorStop(0, `rgba(${rgb(fromColor)},${lineAlpha})`);
            grad.addColorStop(1, `rgba(${rgb(toColor)},${lineAlpha * 0.5})`);

            ctx.beginPath();
            ctx.moveTo(from.x, from.y);
            ctx.quadraticCurveTo(cpx, cpy, to.x, to.y);
            ctx.strokeStyle = grad;
            ctx.lineWidth = isHighlit ? 1.8 : 1.2;
            ctx.stroke();
        });
    }

    function drawStreamParticles() {
        for (let i = streams.length - 1; i >= 0; i--) {
            const s = streams[i];
            const from = nodes[s.fromId], to = nodes[s.toId];
            if (!from || !to) { streams.splice(i, 1); continue; }

            s.t += s.speed;
            if (s.t >= 1) { streams.splice(i, 1); continue; }

            const { cpx, cpy } = getControlPoint(from.x, from.y, to.x, to.y);
            const u = 1 - s.t;
            const sx = u*u*from.x + 2*u*s.t*cpx + s.t*s.t*to.x;
            const sy = u*u*from.y + 2*u*s.t*cpy + s.t*s.t*to.y;

            // trailing glow
            drawGlowCircle(sx, sy, s.r, s.color, 0.85, 8);

            ctx.beginPath();
            ctx.arc(sx, sy, s.r, 0, Math.PI*2);
            ctx.fillStyle = `rgba(${rgb(s.color)},1)`;
            ctx.fill();
        }
    }

    function drawPulseWaves(now) {
        for (let i = pulseWaves.length - 1; i >= 0; i--) {
            const pw = pulseWaves[i];
            const age = (now - pw.born) / 1000;
            pw.r = pw.maxR * (age / 2.5);
            pw.alpha = 0.5 * (1 - age / 2.5);
            if (pw.alpha <= 0) { pulseWaves.splice(i, 1); continue; }

            ctx.beginPath();
            ctx.arc(cx, cy, pw.r, 0, Math.PI*2);
            ctx.strokeStyle = `rgba(${rgb(C.glow)},${pw.alpha * 0.5})`;
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }
    }

    function drawNode(n, t) {
        const breathe = 1 + 0.06 * Math.sin(t * 0.002 + n.pulsePhase);
        const hoverBoost = n.hovered ? 1.25 : 1;
        n.curRadius = n.baseRadius * breathe * hoverBoost;
        const r = n.curRadius;

        // outer glow
        const glowSize = n.hovered ? r * 2.8 : r * 2.0;
        drawGlowCircle(n.x, n.y, r, n.color, n.hovered ? 0.55 : 0.28, glowSize);

        // core circle with gradient
        const grad = ctx.createRadialGradient(n.x - r*0.3, n.y - r*0.3, 0, n.x, n.y, r);
        grad.addColorStop(0, `rgba(${rgb(n.color)},0.95)`);
        grad.addColorStop(0.5, `rgba(${rgb(n.color)},0.55)`);
        grad.addColorStop(1, `rgba(${rgb(n.color)},0.15)`);
        ctx.beginPath();
        ctx.arc(n.x, n.y, r, 0, Math.PI*2);
        ctx.fillStyle = grad;
        ctx.fill();

        // ring
        ctx.beginPath();
        ctx.arc(n.x, n.y, r, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(${rgb(n.color)},${n.hovered ? 0.9 : 0.55})`;
        ctx.lineWidth = n.isCenter ? 2 : 1.2;
        ctx.stroke();

        // spinning dashed ring on center node
        if (n.isCenter) {
            ctx.save();
            ctx.translate(n.x, n.y);
            ctx.rotate(t * 0.0005);
            ctx.beginPath();
            ctx.arc(0, 0, r + 10, 0, Math.PI*2);
            ctx.setLineDash([6, 8]);
            ctx.strokeStyle = `rgba(${rgb(C.glow)},0.25)`;
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.restore();

            // second ring, counter-rotate
            ctx.save();
            ctx.translate(n.x, n.y);
            ctx.rotate(-t * 0.0003);
            ctx.beginPath();
            ctx.arc(0, 0, r + 18, 0, Math.PI*2);
            ctx.setLineDash([3, 14]);
            ctx.strokeStyle = `rgba(${rgb(C.violet)},0.18)`;
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.restore();
        }

        // label
        const fontSize = n.isCenter ? 13 : 10;
        ctx.font = `${n.isCenter ? 700 : 500} ${fontSize}px 'Outfit', sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const labelY = n.y + r + (n.isCenter ? 20 : 16);
        ctx.fillStyle = `rgba(${rgb(n.color)},${n.hovered ? 1 : 0.8})`;
        ctx.fillText(n.label, n.x, labelY);
    }

    // ─── Main animation loop ─────────────────────────────────────────────────
    let lastTime = 0;

    function animate(now) {
        requestAnimationFrame(animate);
        const dt = now - lastTime; lastTime = now;

        // Update orbital positions
        for (const id in nodes) {
            const n = nodes[id];
            if (n.isCenter) { n.pulsePhase += 0.008; continue; }
            n.angle += n.orbitSpeed * 60; // frame-rate independent feel
            const rx = orbitRadius * (1 + n.orbitEccentricity * Math.cos(n.angle * 0.7));
            const ry = orbitRadius * (1 - n.orbitEccentricity * Math.sin(n.angle * 0.5));
            n.x = cx + Math.cos(n.angle) * rx;
            n.y = cy + Math.sin(n.angle) * ry;
            n.pulsePhase += 0.005;
        }

        // Spawn stream particles
        streamTimer += dt;
        if (streamTimer > 180 && streams.length < MAX_STREAM) {
            spawnStream(); streamTimer = 0;
        }

        // Spawn pulse waves
        pulseTimer += dt;
        if (pulseTimer > 3200) { spawnPulse(); pulseTimer = 0; }

        // Clear
        ctx.clearRect(0, 0, W, H);

        // Deep space background glow
        const bgGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W,H)*0.7);
        bgGrad.addColorStop(0,   `rgba(0,30,50,0.18)`);
        bgGrad.addColorStop(0.5, `rgba(10,5,30,0.1)`);
        bgGrad.addColorStop(1,   `rgba(2,2,6,0)`);
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, W, H);

        drawAmbientParticles();
        drawPulseWaves(now);
        drawConnections(now);
        drawStreamParticles();

        // Draw satellite nodes then center (so center is on top)
        for (const id in nodes) {
            if (!nodes[id].isCenter) drawNode(nodes[id], now);
        }
        drawNode(nodes['datbotty'], now);

        updateHover();
    }

    // ─── Init ────────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
        resize();
        initParticles();
    });

    resize();
    initParticles();
    spawnPulse();
    requestAnimationFrame(animate);

})();
</script>
</body>
</html>
