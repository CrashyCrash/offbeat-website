        /* Animated mesh gradient background */
        .mesh-bg {

        .scanlines {

            inset: 0;

            pointer-events: none;

        }

            backdrop-filter: blur(20px);

            letter-spacing: 0.08em;

        .brand svg {

            height: 32px;

        .brand::after {
