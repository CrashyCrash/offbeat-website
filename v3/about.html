        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500;600;700&display=swap');

        :root {
            --color-background: #020206;
            --color-primary: #00ffff; /* Glow Cyan */
            --color-secondary: #9932cc; /* Glow Violet */
            --color-text-primary: #ffffff;
            --color-text-secondary: #cccccc;
            --color-button-bg: #00ffff;
            --color-button-text: #020206;
            --color-button-hover-bg: #00ffff; /* No lift/translate */
            --color-button-hover-text: #020206; /* No lift/translate */
            --font-family-heading: 'Outfit', sans-serif;
            --font-family-body: 'Fira Code', monospace;
            --spacing-unit: 1rem;
            --border-radius: 8px;
            --shadow-glow: 0 0 15px rgba(0, 255, 255, 0.7), 0 0 25px rgba(153, 50, 204, 0.5);
        }

        body {
            margin: 0;
            font-family: var(--font-family-body);
            background-color: var(--color-background);
            color: var(--color-text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 var(--spacing-unit);
        }

        header {
            background-color: rgba(2, 2, 6, 0.8);
            backdrop-filter: blur(10px);
            padding: var(--spacing-unit) 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(0, 255, 255, 0.1);
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: var(--font-family-heading);
            font-weight: 700;
            font-size: 1.8rem;
            color: var(--color-primary);
            text-decoration: none;
            text-shadow: var(--shadow-glow);
        }

        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
        }

        nav ul li {
            margin-left: calc(var(--spacing-unit) * 2);
        }

        nav ul li a {
            color: var(--color-text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }

        nav ul li a:hover {
            color: var(--color-primary);
            text-shadow: var(--shadow-glow);
        }

        nav ul li a.active {
            color: var(--color-primary);
            text-shadow: var(--shadow-glow);
        }

        .hero {
            text-align: center;
            padding: calc(var(--spacing-unit) * 6) 0;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0, 255, 255, 0.05) 0%, rgba(153, 50, 204, 0.05) 50%, transparent 70%);
            z-index: 1;
        }

        .hero h1 {
            font-family: var(--font-family-heading);
            font-size: 3.5rem;
            margin-bottom: var(--spacing-unit);
            color: var(--color-primary);
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8), 0 0 20px rgba(153, 50, 204, 0.6);
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--color-text-secondary);
            max-width: 800px;
            margin: 0 auto;
        }

        .section {
            padding: calc(var(--spacing-unit) * 4) 0;
            position: relative;
            z-index: 2;
        }

        .section h2 {
            font-family: var(--font-family-heading);
            font-size: 2.5rem;
            color: var(--color-primary);
            text-align: center;
            margin-bottom: calc(var(--spacing-unit) * 3);
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.7), 0 0 15px rgba(153, 50, 204, 0.5);
        }

        .section-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: calc(var(--spacing-unit) * 3);
        }

        .section-item {
            background-color: rgba(255, 255, 255, 0.03);
            padding: calc(var(--spacing-unit) * 2);
            border-radius: var(--border-radius);
            border: 1px solid rgba(0, 255, 255, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .section-item:hover {
            box-shadow: var(--shadow-glow);
        }
