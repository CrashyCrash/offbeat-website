<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DatBotty Brainstorm — Synthwave</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap');
  :root {
    --bg: #0d0014;
    --bg2: #130020;
    --surface: #1a0030;
    --surface2: #220040;
    --border: rgba(255,0,255,0.15);
    --border-glow: rgba(255,0,255,0.5);
    --pink: #ff00ff;
    --pink-dim: rgba(255,0,255,0.12);
    --cyan: #00f5ff;
    --cyan-dim: rgba(0,245,255,0.1);
    --yellow: #ffe600;
    --green: #00ff99;
    --red: #ff3366;
    --text: #f0e6ff;
    --text-muted: #a080c0;
    --mono: 'Share Tech Mono', monospace;
    --ui: 'Rajdhani', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--ui);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 40% at 50% 0%, rgba(120,0,255,0.25) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,0,255,0.04) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(0,245,255,0.04) 40px);
  }

  header {
    border-bottom: 1px solid var(--border);
    background: rgba(13,0,20,0.8);
    backdrop-filter: blur(20px);
    padding: 12px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 0 40px rgba(255,0,255,0.1);
  }
  .logo {
    font-family: var(--mono);
    font-size: 20px;
    color: var(--pink);
    text-shadow: 0 0 20px var(--pink), 0 0 40px rgba(255,0,255,0.5);
    letter-spacing: 2px;
  }
  .logo span { color: var(--cyan); text-shadow: 0 0 20px var(--cyan); }
  .header-tag {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--cyan);
    border: 1px solid var(--cyan);
    padding: 3px 10px;
    border-radius: 2px;
    text-shadow: 0 0 8px var(--cyan);
    box-shadow: 0 0 12px rgba(0,245,255,0.15) inset;
    letter-spacing: 1px;
  }
  .btn-icon {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 32px; height: 32px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    margin-left: 6px;
    transition: all 0.2s;
  }
  .btn-icon:hover { border-color: var(--pink); color: var(--pink); box-shadow: 0 0 10px rgba(255,0,255,0.3); }

  main { padding: 28px; max-width: 1300px; margin: 0 auto; }

  .section-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--pink);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }
  .project-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .project-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--pink), var(--cyan), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .project-card:hover { border-color: var(--pink); box-shadow: 0 0 30px rgba(255,0,255,0.15), inset 0 0 30px rgba(255,0,255,0.03); }
  .project-card:hover::before { opacity: 1; }
  .project-icon { font-size: 24px; margin-bottom: 12px; }
  .project-name {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }
  .project-desc { font-size: 12px; color: var(--text-muted); line-height: 1.5; margin-bottom: 14px; }
  .project-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
  }
  .project-meta .active { color: var(--cyan); }
  .glow-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--pink), var(--cyan));
    opacity: 0;
    transition: opacity .2s;
  }
  .project-card:hover .glow-bar { opacity: 0.6; }

  /* Ideas view */
  .ideas-view { display: none; }
  .ideas-view.active { display: block; }
  .projects-view.hidden { display: none; }

  .back-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--pink);
    padding: 6px 14px;
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    border-radius: 3px;
    margin-bottom: 20px;
    letter-spacing: 1px;
    transition: all .2s;
  }
  .back-btn:hover { border-color: var(--pink); box-shadow: 0 0 10px rgba(255,0,255,0.3); }

  .ideas-list { display: flex; flex-direction: column; gap: 8px; }
  .idea-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    cursor: pointer;
    transition: all .15s;
  }
  .idea-card:hover { border-color: rgba(255,0,255,0.3); }
  .idea-card.status-now { border-left: 2px solid var(--green); }
  .idea-card.status-later { border-left: 2px solid var(--yellow); }
  .idea-card.status-pass { opacity: 0.45; }
  .idea-card.status-done { opacity: 0.55; border-left: 2px solid var(--cyan); }
  .idea-info { flex: 1; }
  .idea-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
  .idea-desc { font-size: 12px; color: var(--text-muted); line-height: 1.5; }
  .status-badge {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 8px;
    border: 1px solid;
    border-radius: 2px;
    white-space: nowrap;
    letter-spacing: 1px;
    flex-shrink: 0;
  }
  .badge-now { color: var(--green); border-color: var(--green); text-shadow: 0 0 6px var(--green); }
  .badge-later { color: var(--yellow); border-color: var(--yellow); }
  .badge-done { color: var(--cyan); border-color: var(--cyan); text-shadow: 0 0 6px var(--cyan); }
  .badge-none { color: var(--text-muted); border-color: var(--border); }

  .filters {
    display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap;
  }
  .filter-btn {
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 12px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 2px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all .2s;
  }
  .filter-btn:hover, .filter-btn.active { border-color: var(--cyan); color: var(--cyan); }

  .ai-fab {
    position: fixed;
    bottom: 28px; right: 28px;
    background: linear-gradient(135deg, var(--pink), var(--cyan));
    border: none;
    border-radius: 50%;
    width: 52px; height: 52px;
    font-size: 20px;
    cursor: pointer;
    box-shadow: 0 0 30px rgba(255,0,255,0.5), 0 0 60px rgba(0,245,255,0.3);
    animation: fab-pulse 3s ease-in-out infinite;
    display: flex; align-items: center; justify-content: center;
    color: #000;
    font-weight: bold;
  }
  @keyframes fab-pulse { 0%,100%{box-shadow:0 0 30px rgba(255,0,255,.5),0 0 60px rgba(0,245,255,.3)} 50%{box-shadow:0 0 50px rgba(255,0,255,.8),0 0 100px rgba(0,245,255,.5)} }

  .stats-bar {
    display: flex;
    gap: 20px;
    margin-bottom: 24px;
    font-family: var(--mono);
    font-size: 12px;
  }
  .stat { color: var(--text-muted); }
  .stat span { color: var(--pink); }
  .stat.c { color: var(--text-muted); }
  .stat.c span { color: var(--cyan); }
</style>
</head>
<body>
<header>
  <div class="logo">DATBOTTY<span>_BRAINSTORM</span></div>
  <div class="header-tag">SYNTHWAVE MODE</div>
  <div style="display:flex">
    <button class="btn-icon" title="AI">✦</button>
    <button class="btn-icon" title="Settings">⚙</button>
  </div>
</header>
<main>
  <div class="projects-view" id="projectsView">
    <div class="section-label">∇ PROJECT CHANNELS</div>
    <div class="stats-bar">
      <div class="stat">PROJECTS <span>9</span></div>
      <div class="stat c">ACTIVE <span id="activeCount">0</span></div>
      <div class="stat">DONE <span id="doneCount">0</span></div>
    </div>
    <div class="projects-grid" id="projectsGrid"></div>
  </div>
  <div class="ideas-view" id="ideasView">
    <button class="back-btn" onclick="backToProjects()">⬅ BACK TO CHANNELS</button>
    <div class="section-label" id="ideasSectionLabel">∇ IDEAS</div>
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter(this,'all')">ALL</button>
      <button class="filter-btn" onclick="setFilter(this,'now')">ACTIVE</button>
      <button class="filter-btn" onclick="setFilter(this,'later')">QUEUED</button>
      <button class="filter-btn" onclick="setFilter(this,'done')">DONE</button>
      <button class="filter-btn" onclick="setFilter(this,'pass')">PASSED</button>
    </div>
    <div class="ideas-list" id="ideasList"></div>
  </div>
</main>
<button class="ai-fab" title="Ask AI">✦</button>

<script>
const PROJECTS = [
  { id:'autonomy', name:'Autonomy Acceleration', icon:'🤖', desc:'Making DatBotty more self-directing, faster', ideas:[
    {title:'Self-generated session prompts',status:'done'},{title:'Session uniqueness enforcement',status:'done'},
    {title:'Self-retrospective',status:'later'},{title:'Regression detection',status:'later'},
    {title:'DesignArena for architecture decisions',status:'now'},{title:'Budget-aware dispatch',status:'later'},
    {title:'Wire SUPERVISOR_ACTIVE.flag',status:'now'},{title:'Stall alarm',status:'later'},
  ]},
  { id:'experience', name:'Crash Daily Experience', icon:'📱', desc:'Day-to-day interaction improvements', ideas:[
    {title:'Telegram partial re-enable',status:null},{title:'Morning briefing with a real finding',status:'later'},
    {title:'Evening recap briefing',status:null},{title:'Weekly letter from DatBotty',status:'later'},
    {title:'Status page',status:'done'},{title:'Fewer but better notifications',status:'now'},
  ]},
  { id:'business', name:'Business Intelligence', icon:'💼', desc:'Revenue-linked activities', ideas:[
    {title:'Affiliate opportunity scanner',status:'done'},{title:'Content calendar',status:null},
    {title:'Competitor intelligence',status:null},{title:'SEO keyword tracker',status:'done'},
    {title:'Revenue dashboard',status:'later'},
  ]},
  { id:'capabilities', name:'New Capabilities', icon:'⚡', desc:"Things DatBotty can't do today", ideas:[
    {title:'Image/screenshot analysis',status:'now'},{title:'Self-benchmark',status:null},
    {title:'External model consultation',status:'now'},{title:'Automatic skill discovery',status:'done'},
    {title:'n8n workflow health scoring',status:'done'},
  ]},
  { id:'home', name:'Home & Life Automation', icon:'🏠', desc:'Connecting to physical environment', ideas:[
    {title:'Home Assistant first connection',status:'later'},{title:'Morning activation routine',status:null},
    {title:'Server health to HA',status:'later'},{title:'"DatBotty on TV" panel',status:null},
  ]},
  { id:'dj', name:'DJ & Musical Intelligence', icon:'🎧', desc:'Crash as "mutha effin CRASH"', ideas:[
    {title:'New release tracker',status:null},{title:'Trending tracks radar',status:'later'},
    {title:'DJ set generator upgrade',status:'later'},{title:'Music niche trend report',status:null},
  ]},
  { id:'infra', name:'Infrastructure & Reliability', icon:'🔧', desc:'Making DatBotty harder to break', ideas:[
    {title:'Automated daily backup',status:'later'},{title:'Docker health watchdog',status:'later'},
    {title:'Log rotation',status:'later'},{title:'Pop-out window precise targeting',status:'now'},
  ]},
  { id:'intel', name:'Intelligence & Research', icon:'🔬', desc:'DatBotty becoming smarter', ideas:[
    {title:'Curated daily news digest',status:null},{title:'AI capability tracking',status:'done'},
    {title:'PrepDeck research pipeline',status:'later'},
  ]},
  { id:'experimental', name:'Experimental / Blue Sky', icon:'🚀', desc:'Higher-risk, higher-reward', ideas:[
    {title:'Voice-activated queries',status:'now'},{title:'DatBotty north star document',status:'done'},
    {title:'Crash digital twin',status:'now'},{title:'Session peer review',status:'done'},
    {title:'This brainstorm app',status:'done'},
  ]},
];

let currentFilter = 'all';
let currentProjectId = null;

function renderProjects() {
  let active=0, done=0;
  PROJECTS.forEach(p => {
    active += p.ideas.filter(i=>i.status==='now').length;
    done += p.ideas.filter(i=>i.status==='done').length;
  });
  document.getElementById('activeCount').textContent = active;
  document.getElementById('doneCount').textContent = done;
  const grid = document.getElementById('projectsGrid');
  grid.innerHTML = '';
  PROJECTS.forEach(p => {
    const nowN = p.ideas.filter(i=>i.status==='now').length;
    const doneN = p.ideas.filter(i=>i.status==='done').length;
    const d = document.createElement('div');
    d.className = 'project-card';
    d.innerHTML = `
      <div class="project-icon">${p.icon}</div>
      <div class="project-name">${p.name}</div>
      <div class="project-desc">${p.desc}</div>
      <div class="project-meta">
        <span>${p.ideas.length} IDEAS</span>
        <span>${nowN ? `<span class="active">${nowN} ACTIVE</span>` : ''}${doneN ? ` ${doneN} DONE` : ''}</span>
      </div>
      <div class="glow-bar"></div>`;
    d.onclick = () => showProject(p.id);
    grid.appendChild(d);
  });
}

function showProject(id) {
  currentProjectId = id;
  currentFilter = 'all';
  const proj = PROJECTS.find(p=>p.id===id);
  document.getElementById('ideasSectionLabel').textContent = `∇ ${proj.name.toUpperCase()}`;
  document.getElementById('projectsView').classList.add('hidden');
  document.getElementById('ideasView').classList.add('active');
  renderIdeas();
}
function backToProjects() {
  currentProjectId = null;
  document.getElementById('projectsView').classList.remove('hidden');
  document.getElementById('ideasView').classList.remove('active');
}
function setFilter(btn, f) {
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = f;
  renderIdeas();
}
function renderIdeas() {
  const proj = PROJECTS.find(p=>p.id===currentProjectId);
  let ideas = proj.ideas;
  if (currentFilter !== 'all') ideas = ideas.filter(i=> currentFilter==='pass'?i.status===null||(i.status&&!['now','later','done'].includes(i.status)):i.status===currentFilter);
  const list = document.getElementById('ideasList');
  list.innerHTML = '';
  ideas.forEach(i => {
    const badges = {now:'◈ ACTIVE',later:'◇ QUEUED',done:'◉ DONE',null:'○ OPEN'};
    const badgeClass = {now:'badge-now',later:'badge-later',done:'badge-done',null:'badge-none'};
    const d = document.createElement('div');
    d.className = `idea-card${i.status?' status-'+i.status:''}`;
    d.innerHTML = `
      <div class="idea-info">
        <div class="idea-title">${i.title}</div>
      </div>
      <div class="status-badge ${badgeClass[i.status||'null']}">${badges[i.status||'null']}</div>`;
    list.appendChild(d);
  });
  if (!list.children.length) list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);font-family:var(--mono);font-size:12px;">// NO_RESULTS</div>';
}
renderProjects();
</script>
</body>
</html>
