<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DatBotty Brainstorm — Terminal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap');
  :root {
    --bg: #000000;
    --surface: #0a0a0a;
    --border: rgba(0,255,65,0.2);
    --green: #00ff41;
    --green-dim: rgba(0,255,65,0.08);
    --green-mid: rgba(0,255,65,0.5);
    --amber: #ffcc00;
    --red: #ff4444;
    --text: #c8ffc0;
    --text-muted: rgba(0,255,65,0.45);
    --font: 'JetBrains Mono', 'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    min-height: 100vh;
    cursor: default;
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #000; }
  ::-webkit-scrollbar-thumb { background: rgba(0,255,65,.3); }

  header {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky; top: 0; z-index: 100;
  }
  .term-dots { display: flex; gap: 6px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot.red { background: #ff5f56; }
  .dot.yellow { background: #ffbd2e; }
  .dot.green { background: #27c93f; }
  .term-title {
    flex: 1;
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 1px;
  }
  .term-status {
    font-size: 11px;
    color: var(--green);
    opacity: 0.7;
  }

  .terminal {
    padding: 20px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .prompt-line {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 6px;
    line-height: 1.6;
  }
  .prompt-sym {
    color: var(--green);
    font-weight: 700;
    flex-shrink: 0;
  }
  .prompt-cmd { color: var(--text); }
  .prompt-arg { color: var(--amber); }
  .prompt-flag { color: var(--text-muted); }
  .output-block { margin: 10px 0 24px 20px; }

  .section-header {
    color: var(--green);
    margin-bottom: 12px;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 2px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-header::after {
    content: '─────────────────────────────────────────────────────';
    color: var(--border);
    overflow: hidden;
    white-space: nowrap;
    font-weight: 400;
  }

  .project-table {
    border-left: 1px solid var(--border);
    padding-left: 12px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .project-row {
    display: grid;
    grid-template-columns: 1.8em 200px 80px 90px auto;
    gap: 8px;
    padding: 5px 8px;
    border-radius: 2px;
    cursor: pointer;
    transition: background .1s;
    align-items: center;
  }
  .project-row:hover { background: var(--green-dim); }
  .project-row .icon { font-size: 14px; }
  .project-row .name { color: var(--text); font-weight: 500; }
  .project-row .ideas { color: var(--text-muted); font-size: 11px; text-align: right; }
  .project-row .active { color: var(--green); font-size: 11px; text-align: right; }
  .project-row .done { color: var(--text-muted); font-size: 11px; text-align: right; }

  /* Ideas table */
  .ideas-section { display: none; }
  .ideas-section.active { display: block; }
  .projects-section.hidden { display: none; }

  .idea-row {
    display: grid;
    grid-template-columns: 16px auto 90px;
    gap: 12px;
    padding: 5px 8px;
    border-left: 1px solid var(--border);
    margin-bottom: 2px;
    cursor: pointer;
    transition: background .1s;
    align-items: center;
    border-radius: 2px;
  }
  .idea-row:hover { background: var(--green-dim); }
  .idea-row .idx { color: var(--text-muted); font-size: 11px; }
  .idea-row .title { color: var(--text); }
  .idea-row .status {
    font-size: 11px;
    text-align: right;
    font-weight: 500;
  }
  .idea-row .status.now { color: var(--green); }
  .idea-row .status.later { color: var(--amber); }
  .idea-row .status.done { color: var(--text-muted); }
  .idea-row .status.none { color: rgba(0,255,65,0.2); }

  .back-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 5px 12px;
    font-family: var(--font);
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 0.5px;
    border-radius: 2px;
    margin-bottom: 16px;
    transition: all .2s;
  }
  .back-btn:hover { border-color: var(--green); color: var(--green); }

  .filters {
    display: flex; gap: 2px; margin-bottom: 14px; flex-wrap: wrap;
    border-left: 1px solid var(--border);
    padding-left: 10px;
  }
  .filter-btn {
    font-family: var(--font);
    font-size: 11px;
    padding: 3px 10px;
    background: transparent;
    border: 1px solid transparent;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 1px;
    transition: all .2s;
  }
  .filter-btn:hover { color: var(--text); }
  .filter-btn.active { border-color: var(--border); color: var(--green); background: var(--green-dim); }

  .cursor {
    display: inline-block;
    width: 8px; height: 14px;
    background: var(--green);
    animation: blink 1s step-end infinite;
    vertical-align: text-bottom;
    margin-left: 2px;
  }
  @keyframes blink { 0%,100%{opacity:1} 49%{opacity:1} 50%{opacity:0} 99%{opacity:0} }

  .ai-fab {
    position: fixed;
    bottom: 24px; right: 24px;
    background: transparent;
    border: 1px solid var(--green);
    color: var(--green);
    font-family: var(--font);
    font-size: 13px;
    padding: 8px 14px;
    cursor: pointer;
    letter-spacing: 2px;
    transition: all .2s;
    box-shadow: 0 0 20px rgba(0,255,65,0.15);
  }
  .ai-fab:hover { background: var(--green-dim); box-shadow: 0 0 30px rgba(0,255,65,0.3); }
</style>
</head>
<body>
<header>
  <div class="term-dots">
    <div class="dot red"></div>
    <div class="dot yellow"></div>
    <div class="dot green"></div>
  </div>
  <div class="term-title">datbotty@igpu-k11 — brainstorm v2.0</div>
  <div class="term-status">●  CONNECTED</div>
</header>

<div class="terminal">
  <div class="projects-section" id="projectsSection">
    <div class="prompt-line">
      <span class="prompt-sym">datbotty@igpu-k11 ~$</span>
      <span class="prompt-cmd">brainstorm</span>
      <span class="prompt-arg">list-projects</span>
      <span class="prompt-flag">--show-status</span>
    </div>
    <div class="output-block">
      <div class="section-header">PROJECTS</div>
      <div class="project-table" id="projectTable"></div>
    </div>
    <div class="prompt-line">
      <span class="prompt-sym">datbotty@igpu-k11 ~$</span>
      <span class="cursor"></span>
    </div>
  </div>

  <div class="ideas-section" id="ideasSection">
    <div class="prompt-line">
      <span class="prompt-sym">datbotty@igpu-k11 ~$</span>
      <span class="prompt-cmd">brainstorm</span>
      <span class="prompt-arg">show</span>
      <span class="prompt-flag" id="projectArg"></span>
    </div>
    <div class="output-block">
      <button class="back-btn" onclick="backToProjects()">cd .. ↩</button>
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:12px">
        <div class="section-header" id="ideasHeader">IDEAS</div>
      </div>
      <div class="filters">
        <button class="filter-btn active" onclick="setFilter(this,'all')">all</button>
        <button class="filter-btn" onclick="setFilter(this,'now')">active</button>
        <button class="filter-btn" onclick="setFilter(this,'later')">queued</button>
        <button class="filter-btn" onclick="setFilter(this,'done')">done</button>
      </div>
      <div id="ideasTable"></div>
    </div>
    <div class="prompt-line">
      <span class="prompt-sym">datbotty@igpu-k11 ~$</span>
      <span class="cursor"></span>
    </div>
  </div>
</div>

<button class="ai-fab" onclick="alert('AI panel — configure endpoint in settings')">[ ask_ai ]</button>

<script>
const PROJECTS = [
  {id:'autonomy',name:'autonomy-acceleration',icon:'🤖',desc:'Self-directing systems',ideas:[
    {title:'self-generated-session-prompts',status:'done'},{title:'session-uniqueness-enforcement',status:'done'},
    {title:'self-retrospective',status:'later'},{title:'regression-detection',status:'later'},
    {title:'design-arena-integration',status:'now'},{title:'wire-supervisor-active-flag',status:'now'},
  ]},
  {id:'experience',name:'crash-daily-experience',icon:'📱',desc:'Interaction improvements',ideas:[
    {title:'telegram-partial-re-enable',status:null},{title:'morning-briefing-real-finding',status:'later'},
    {title:'status-page',status:'done'},{title:'fewer-better-notifications',status:'now'},
  ]},
  {id:'business',name:'business-intelligence',icon:'💼',desc:'Revenue activities',ideas:[
    {title:'affiliate-opportunity-scanner',status:'done'},{title:'content-calendar',status:null},
    {title:'seo-keyword-tracker',status:'done'},{title:'revenue-dashboard',status:'later'},
  ]},
  {id:'capabilities',name:'new-capabilities',icon:'⚡',desc:"New things DatBotty can do",ideas:[
    {title:'image-screenshot-analysis',status:'now'},{title:'external-model-consultation',status:'now'},
    {title:'automatic-skill-discovery',status:'done'},{title:'n8n-health-scoring',status:'done'},
  ]},
  {id:'home',name:'home-automation',icon:'🏠',desc:'Physical environment',ideas:[
    {title:'home-assistant-connection',status:'later'},{title:'morning-activation',status:null},
    {title:'server-health-to-ha',status:'later'},
  ]},
  {id:'dj',name:'dj-musical-intelligence',icon:'🎧',desc:'Musical awareness',ideas:[
    {title:'new-release-tracker',status:null},{title:'trending-tracks-radar',status:'later'},
    {title:'dj-set-generator-upgrade',status:'later'},
  ]},
  {id:'infra',name:'infrastructure-reliability',icon:'🔧',desc:'Robustness',ideas:[
    {title:'automated-daily-backup',status:'later'},{title:'docker-health-watchdog',status:'later'},
    {title:'pop-out-window-targeting',status:'now'},
  ]},
  {id:'intel',name:'intelligence-research',icon:'🔬',desc:'Knowledge acquisition',ideas:[
    {title:'curated-news-digest',status:null},{title:'ai-capability-tracking',status:'done'},
  ]},
  {id:'experimental',name:'experimental-blue-sky',icon:'🚀',desc:'High-risk/reward',ideas:[
    {title:'voice-activated-queries',status:'now'},{title:'crash-digital-twin',status:'now'},
    {title:'north-star-document',status:'done'},{title:'brainstorm-app',status:'done'},
  ]},
];

let filter = 'all';
let currentId = null;

function renderProjects() {
  const t = document.getElementById('projectTable');
  t.innerHTML = PROJECTS.map((p,i) => {
    const now = p.ideas.filter(x=>x.status==='now').length;
    const done = p.ideas.filter(x=>x.status==='done').length;
    return `<div class="project-row" onclick="showProject('${p.id}')">
      <span class="icon">${p.icon}</span>
      <span class="name">${p.name}</span>
      <span class="ideas">${p.ideas.length} ideas</span>
      <span class="active">${now ? now+' active' : '—'}</span>
      <span class="done">${done ? done+' done' : ''}</span>
    </div>`;
  }).join('');
}
function showProject(id) {
  currentId = id;
  filter = 'all';
  const proj = PROJECTS.find(p=>p.id===id);
  document.getElementById('projectArg').textContent = id;
  document.getElementById('ideasHeader').textContent = proj.name.toUpperCase();
  document.getElementById('projectsSection').classList.add('hidden');
  document.getElementById('ideasSection').classList.add('active');
  renderIdeas();
}
function backToProjects() {
  currentId = null;
  document.getElementById('projectsSection').classList.remove('hidden');
  document.getElementById('ideasSection').classList.remove('active');
}
function setFilter(btn, f) {
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filter = f;
  renderIdeas();
}
function renderIdeas() {
  const proj = PROJECTS.find(p=>p.id===currentId);
  let ideas = proj.ideas;
  if (filter !== 'all') ideas = ideas.filter(i=> filter==='done'?i.status==='done':filter==='later'?i.status==='later':filter==='now'?i.status==='now':!i.status);
  const t = document.getElementById('ideasTable');
  t.innerHTML = ideas.map((i,n) => {
    const stLabels = {now:'[ACTIVE]',later:'[QUEUED]',done:'[DONE]',null:'[OPEN]'};
    const stClass = i.status||'none';
    return `<div class="idea-row">
      <span class="idx">${String(n+1).padStart(2,'0')}</span>
      <span class="title">${i.title}</span>
      <span class="status ${stClass}">${stLabels[i.status||'null']}</span>
    </div>`;
  }).join('') || '<div style="padding:16px;color:var(--text-muted)"># no results</div>';
}
renderProjects();
</script>
</body>
</html>
