<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DatBotty Brainstorm</title>
<style>
  :root {
    --bg: #080a10;
    --surface: #0f1118;
    --surface2: #161a24;
    --border: rgba(255,255,255,0.07);
    --border-bright: rgba(0,212,255,0.25);
    --cyan: #00d4ff;
    --cyan-dim: rgba(0,212,255,0.12);
    --purple: #a855f7;
    --purple-dim: rgba(168,85,247,0.12);
    --now: #22c55e;
    --now-dim: rgba(34,197,94,0.12);
    --later: #f59e0b;
    --later-dim: rgba(245,158,11,0.12);
    --pass: #ef4444;
    --pass-dim: rgba(239,68,68,0.1);
    --done: #10b981;
    --done-dim: rgba(16,185,129,0.1);
    --text: #e2e8f0;
    --text-muted: #64748b;
    --text-dim: #94a3b8;
    --radius: 10px;
    --font: 'Inter', system-ui, -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── Header ─── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(16px);
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--cyan);
  }
  .logo span { color: var(--text-muted); font-weight: 400; }
  .ai-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .ai-status:hover { border-color: var(--border-bright); color: var(--text-dim); }
  .ai-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-muted);
  }
  .ai-dot.live { background: var(--now); box-shadow: 0 0 6px var(--now); animation: pulse 2s infinite; }
  .ai-dot.error { background: var(--pass); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

  .header-right { display: flex; align-items: center; gap: 8px; }
  .btn-icon {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 34px; height: 34px;
    border-radius: var(--radius);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-icon:hover { border-color: var(--border-bright); color: var(--cyan); }

  /* ─── Nav tabs ─── */
  .nav-bar {
    display: flex;
    align-items: center;
    gap: 2px;
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .nav-tab {
    padding: 6px 14px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: color 0.2s, background 0.2s;
  }
  .nav-tab:hover { color: var(--text); background: var(--surface2); }
  .nav-tab.active { color: var(--cyan); background: var(--cyan-dim); }
  .nav-breadcrumb {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-muted);
    flex: 1;
  }
  .nav-breadcrumb .sep { opacity: 0.4; }
  .nav-breadcrumb .crumb-active { color: var(--text); }

  /* ─── Main content ─── */
  main {
    padding: 24px;
    max-width: 1300px;
    margin: 0 auto;
  }

  /* ─── Projects grid ─── */
  .projects-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .projects-header h1 { font-size: 22px; font-weight: 600; }
  .stats-row {
    display: flex;
    gap: 8px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .stat-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
  }
  .stat-pill.green { border-color: var(--now-dim); color: var(--now); }
  .stat-pill.amber { border-color: var(--later-dim); color: var(--later); }

  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }
  .project-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }
  .project-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: transparent;
    transition: background 0.2s;
  }
  .project-card:hover { border-color: var(--border-bright); }
  .project-card:hover::before { background: linear-gradient(90deg, var(--cyan), var(--purple)); }
  .project-card-icon { font-size: 22px; margin-bottom: 10px; }
  .project-card-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .project-card-desc { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; line-height: 1.5; }
  .project-card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .idea-count { font-size: 12px; color: var(--text-muted); }
  .progress-pills {
    display: flex;
    gap: 4px;
  }
  .progress-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--border);
  }
  .progress-dot.now { background: var(--now); }
  .progress-dot.later { background: var(--later); }
  .progress-dot.done { background: var(--done); }
  .progress-dot.pass { background: var(--pass); opacity: 0.4; }

  /* ─── Ideas list ─── */
  .ideas-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .ideas-header-left { display: flex; align-items: center; gap: 10px; }
  .ideas-title { font-size: 18px; font-weight: 600; }
  .ideas-icon { font-size: 20px; }

  .filter-bar {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .filter-btn.active { background: var(--cyan-dim); border-color: var(--cyan); color: var(--cyan); }
  .filter-btn.f-now.active { background: var(--now-dim); border-color: var(--now); color: var(--now); }
  .filter-btn.f-later.active { background: var(--later-dim); border-color: var(--later); color: var(--later); }
  .filter-btn.f-pass.active { background: var(--pass-dim); border-color: var(--pass); color: var(--pass); }
  .filter-btn.f-done.active { background: var(--done-dim); border-color: var(--done); color: var(--done); }

  .add-idea-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    background: var(--cyan-dim);
    border: 1px solid var(--cyan);
    border-radius: var(--radius);
    color: var(--cyan);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  .add-idea-btn:hover { background: rgba(0,212,255,.2); }

  .ask-ai-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    background: var(--purple-dim);
    border: 1px solid var(--purple);
    border-radius: var(--radius);
    color: var(--purple);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  .ask-ai-btn:hover { background: rgba(168,85,247,.2); }

  .ideas-list { display: flex; flex-direction: column; gap: 8px; }

  .idea-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: border-color 0.2s;
    position: relative;
  }
  .idea-card:hover { border-color: rgba(255,255,255,0.14); }
  .idea-card.status-now { border-left: 2px solid var(--now); }
  .idea-card.status-later { border-left: 2px solid var(--later); }
  .idea-card.status-pass { border-left: 2px solid var(--pass); opacity: 0.5; }
  .idea-card.status-done { border-left: 2px solid var(--done); opacity: 0.6; }

  .idea-main { flex: 1; min-width: 0; }
  .idea-title {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 4px;
    cursor: pointer;
  }
  .idea-title:hover { color: var(--cyan); }
  .idea-desc {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.6;
  }
  .idea-tags {
    display: flex;
    gap: 4px;
    margin-top: 6px;
    flex-wrap: wrap;
  }
  .idea-tag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 20px;
    background: var(--surface2);
    color: var(--text-muted);
    border: 1px solid var(--border);
  }

  .idea-actions {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }
  .status-btn {
    width: 28px; height: 28px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
    position: relative;
  }
  .status-btn[data-tip]:hover::after {
    content: attr(data-tip);
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: #1e2130;
    color: var(--text-dim);
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    white-space: nowrap;
    border: 1px solid var(--border);
    pointer-events: none;
    z-index: 10;
  }
  .status-btn.s-now { color: var(--now); border-color: var(--now); background: var(--now-dim); }
  .status-btn.s-later { color: var(--later); border-color: var(--later); background: var(--later-dim); }
  .status-btn.s-pass { color: var(--pass); border-color: var(--pass); background: var(--pass-dim); }
  .status-btn.s-done { color: var(--done); border-color: var(--done); background: var(--done-dim); }
  .status-btn:hover { border-color: rgba(255,255,255,0.25); color: var(--text); }
  .status-btn.s-now:hover, .status-btn.s-later:hover, .status-btn.s-pass:hover, .status-btn.s-done:hover { opacity: 0.7; }
  .edit-btn {
    width: 28px; height: 28px;
    border-radius: 6px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .edit-btn:hover { color: var(--cyan); background: var(--cyan-dim); border-color: var(--border-bright); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-size: 14px;
  }
  .empty-state .big { font-size: 36px; margin-bottom: 12px; }

  /* ─── All Ideas view ─── */
  .all-ideas-group { margin-bottom: 28px; }
  .group-header {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .group-header:hover { color: var(--text); }
  .group-count {
    background: var(--surface2);
    padding: 1px 8px;
    border-radius: 20px;
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 400;
    border: 1px solid var(--border);
  }
  .group-collapsed .ideas-list { display: none; }

  /* ─── AI Panel (slide up from bottom) ─── */
  .ai-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .ai-overlay.open { opacity: 1; pointer-events: all; }
  .ai-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    max-height: 60vh;
    background: var(--surface);
    border-top: 1px solid var(--border-bright);
    border-radius: 16px 16px 0 0;
    padding: 20px 24px;
    z-index: 201;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(.4,0,.2,1);
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .ai-panel.open { transform: translateY(0); }
  .ai-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .ai-panel-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    font-weight: 600;
    color: var(--purple);
  }
  .ai-close-btn {
    background: transparent; border: none; color: var(--text-muted);
    cursor: pointer; font-size: 18px; padding: 4px;
    transition: color .2s;
  }
  .ai-close-btn:hover { color: var(--text); }
  .ai-context {
    font-size: 12px;
    color: var(--text-muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    font-family: var(--font-mono);
  }
  .ai-messages {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 60px;
    max-height: 200px;
  }
  .ai-msg {
    max-width: 80%;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.6;
  }
  .ai-msg.user {
    background: var(--cyan-dim);
    border: 1px solid rgba(0,212,255,.2);
    color: var(--text);
    align-self: flex-end;
  }
  .ai-msg.assistant {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    align-self: flex-start;
  }
  .ai-suggestions { display: flex; flex-direction: column; gap: 6px; }
  .ai-suggestion-card {
    background: var(--surface2);
    border: 1px solid var(--purple);
    border-radius: 8px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .ai-suggestion-text { font-size: 13px; flex: 1; }
  .ai-suggestion-actions { display: flex; gap: 4px; }
  .sug-add-btn, .sug-dismiss-btn {
    padding: 3px 10px;
    border-radius: 5px;
    font-size: 12px;
    cursor: pointer;
    border: 1px solid;
  }
  .sug-add-btn { background: var(--purple-dim); border-color: var(--purple); color: var(--purple); }
  .sug-add-btn:hover { background: rgba(168,85,247,.25); }
  .sug-dismiss-btn { background: transparent; border-color: var(--border); color: var(--text-muted); }
  .sug-dismiss-btn:hover { border-color: rgba(255,255,255,.2); color: var(--text); }

  .ai-input-row {
    display: flex;
    gap: 8px;
  }
  .ai-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 14px;
    color: var(--text);
    font-size: 13px;
    outline: none;
    font-family: var(--font);
    transition: border-color .2s;
  }
  .ai-input:focus { border-color: var(--purple); }
  .ai-input::placeholder { color: var(--text-muted); }
  .ai-send-btn {
    background: var(--purple-dim);
    border: 1px solid var(--purple);
    border-radius: 8px;
    padding: 9px 16px;
    color: var(--purple);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background .2s;
  }
  .ai-send-btn:hover { background: rgba(168,85,247,.25); }
  .ai-send-btn:disabled { opacity: 0.5; cursor: default; }
  .ai-thinking {
    font-size: 12px;
    color: var(--text-muted);
    animation: blink 1s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ─── Modal ─── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.6);
    z-index: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border-bright);
    border-radius: 14px;
    padding: 24px;
    width: 100%;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    transform: scale(0.96);
    transition: transform 0.2s;
  }
  .modal-overlay.open .modal { transform: scale(1); }
  .modal-title { font-size: 16px; font-weight: 600; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-label { font-size: 12px; color: var(--text-muted); }
  .form-input, .form-textarea, .form-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--text);
    font-size: 13px;
    outline: none;
    font-family: var(--font);
    transition: border-color .2s;
    width: 100%;
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--cyan); }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-select { appearance: none; cursor: pointer; }
  .status-selector {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }
  .status-opt {
    padding: 8px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    text-align: center;
    cursor: pointer;
    font-size: 12px;
    transition: all .2s;
  }
  .status-opt:hover { border-color: rgba(255,255,255,.2); }
  .status-opt.selected-now { border-color: var(--now); background: var(--now-dim); color: var(--now); }
  .status-opt.selected-later { border-color: var(--later); background: var(--later-dim); color: var(--later); }
  .status-opt.selected-pass { border-color: var(--pass); background: var(--pass-dim); color: var(--pass); }
  .status-opt.selected-done { border-color: var(--done); background: var(--done-dim); color: var(--done); }
  .status-opt .opt-icon { font-size: 16px; display: block; margin-bottom: 3px; }
  .modal-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .btn-primary {
    padding: 8px 18px;
    background: var(--cyan-dim);
    border: 1px solid var(--cyan);
    border-radius: 8px;
    color: var(--cyan);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background .2s;
  }
  .btn-primary:hover { background: rgba(0,212,255,.2); }
  .btn-secondary {
    padding: 8px 14px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-secondary:hover { border-color: rgba(255,255,255,.2); color: var(--text); }
  .btn-danger {
    padding: 8px 14px;
    background: var(--pass-dim);
    border: 1px solid var(--pass);
    border-radius: 8px;
    color: var(--pass);
    font-size: 13px;
    cursor: pointer;
    transition: background .2s;
  }
  .btn-danger:hover { background: rgba(239,68,68,.2); }

  /* ─── Settings modal ─── */
  .test-result {
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 6px;
    margin-top: -8px;
  }
  .test-result.ok { background: var(--now-dim); color: var(--now); border: 1px solid var(--now); }
  .test-result.fail { background: var(--pass-dim); color: var(--pass); border: 1px solid var(--pass); }

  /* ─── Search ─── */
  .search-wrap {
    position: relative;
    margin-bottom: 14px;
  }
  .search-icon {
    position: absolute;
    left: 10px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 14px;
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px 8px 32px;
    color: var(--text);
    font-size: 13px;
    outline: none;

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let state = {
  projects: [],
  settings: {
    apiEndpoint: 'http://127.0.0.1:8765/api/chat',
    apiToken: ''
  }
};
let currentView = 'projects';
let currentProjectId = null;
let currentFilter = 'all';
let editingIdeaId = null;
let editingProjectId = null;
let selectedStatus = null;
let aiProjectContext = null;
let aiHistory = [];

function loadState() {
  const saved = localStorage.getItem('datbotty_brainstorm_v2');
  if (saved) {
    try {
      state = JSON.parse(saved);
      // Merge in new default projects if missing
      DEFAULT_PROJECTS.forEach(dp => {
        if (!state.projects.find(p => p.id === dp.id)) {
          state.projects.push(dp);
        }
      });
    } catch(e) {
      state.projects = JSON.parse(JSON.stringify(DEFAULT_PROJECTS));
    }
  } else {
    state.projects = JSON.parse(JSON.stringify(DEFAULT_PROJECTS));
  }
}

function saveState() {
  localStorage.setItem('datbotty_brainstorm_v2', JSON.stringify(state));
  // Sync to server so DatBotty can see ideas without browser inspection
  try {
    fetch('/api/ideas', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(state)});
  } catch(e) {} // fire-and-forget
}

function genId() {
  return 'idea_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
}

// ═══════════════════════════════════════════
//  RENDERING
// ═══════════════════════════════════════════
function render() {
  updateAIStatus();
  if (currentView === 'projects') renderProjects();
  else if (currentView === 'project') renderProjectDetail();
  else if (currentView === 'all') renderAllIdeas();
  renderBreadcrumb();
  updateNavTabs();
}

function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  if (currentView === 'project' && currentProjectId) {
    const proj = state.projects.find(p => p.id === currentProjectId);
    bc.innerHTML = `<span style="cursor:pointer;color:var(--text-muted)" onclick="showView('projects')">Projects</span>
      <span class="sep">›</span>
      <span class="crumb-active">${proj ? proj.icon + ' ' + proj.name : ''}</span>`;
  } else {
    bc.innerHTML = '';
  }
}

function updateNavTabs() {
  document.getElementById('tabProjects').classList.toggle('active', currentView === 'projects');
  document.getElementById('tabAll').classList.toggle('active', currentView === 'all');
}

function renderProjects() {
  const total = state.projects.reduce((a,p) => a + p.ideas.length, 0);
  const nowCount = state.projects.reduce((a,p) => a + p.ideas.filter(i => i.status === 'now').length, 0);
  const doneCount = state.projects.reduce((a,p) => a + p.ideas.filter(i => i.status === 'done').length, 0);
  const el = document.getElementById('mainContent');
  el.innerHTML = `
    <div class="projects-header">
      <h1>All Projects</h1>
      <div class="stats-row">
        <div class="stat-pill">${total} ideas</div>
        <div class="stat-pill green">${nowCount} starting now</div>
        <div class="stat-pill amber">${doneCount} completed</div>
      </div>
    </div>
    <div class="projects-grid" id="projectsGrid"></div>`;
  const grid = document.getElementById('projectsGrid');
  state.projects.forEach(proj => {
    const dots = proj.ideas.slice(0,8).map(i => `<div class="progress-dot ${i.status||''}"></div>`).join('');
    const nowN = proj.ideas.filter(i => i.status === 'now').length;
    const doneN = proj.ideas.filter(i => i.status === 'done').length;
    const card = document.createElement('div');
    card.className = 'project-card';
    card.innerHTML = `
      <div class="project-card-icon">${proj.icon}</div>
      <div class="project-card-name">${proj.name}</div>
      <div class="project-card-desc">${proj.desc}</div>
      <div class="project-card-meta">
        <div class="idea-count">${proj.ideas.length} ideas${nowN ? ` · <span style="color:var(--now)">${nowN} active</span>` : ''}${doneN ? ` · <span style="color:var(--done)">${doneN} done</span>` : ''}</div>
        <div class="progress-pills">${dots}</div>
      </div>`;
    card.onclick = () => showProject(proj.id);
    grid.appendChild(card);
  });
}

function renderProjectDetail() {
  const proj = state.projects.find(p => p.id === currentProjectId);
  if (!proj) return showView('projects');
  let ideas = proj.ideas;
  if (currentFilter !== 'all') ideas = ideas.filter(i => (i.status||'null') === (currentFilter === 'null' ? null : currentFilter) || (currentFilter === 'null' && !i.status));
  const el = document.getElementById('mainContent');
  el.innerHTML = `
    <div class="ideas-header">
      <div class="ideas-header-left">
        <span class="ideas-icon">${proj.icon}</span>
        <span class="ideas-title">${proj.name}</span>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <button class="ask-ai-btn" onclick="openAI('${proj.id}')">✦ Ask AI</button>
        <button class="add-idea-btn" onclick="openNewIdea('${proj.id}')">+ Add Idea</button>
      </div>
    </div>
    <div class="filter-bar" style="margin-bottom:14px">
      ${['all','now','later','pass','done','null'].map(f => `
        <button class="filter-btn f-${f} ${currentFilter===f?'active':''}"
          onclick="setFilter('${f}')">${f==='all'?'All':f==='null'?'Untagged':f.charAt(0).toUpperCase()+f.slice(1)}</button>`).join('')}
    </div>
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input class="search-input" id="searchBox" placeholder="Search ideas…" oninput="renderProjectDetail()">
    </div>
    <div class="ideas-list" id="ideasList"></div>`;
  const q = (document.getElementById('searchBox')||{value:''}).value.toLowerCase();
  const filtered = ideas.filter(i => !q || i.title.toLowerCase().includes(q) || (i.desc||'').toLowerCase().includes(q));
  const list = document.getElementById('ideasList');
  if (!filtered.length) {
    list.innerHTML = '<div class="empty-state"><div class="big">💭</div>No ideas in this view yet.<br>Add one or change the filter.</div>';
    return;
  }
  filtered.forEach(idea => list.appendChild(makeIdeaCard(idea, proj.id)));
}

function renderAllIdeas() {
  const el = document.getElementById('mainContent');
  el.innerHTML = `
    <div class="ideas-header">
      <div class="ideas-title">All Ideas</div>
      <button class="ask-ai-btn" onclick="openAI()">✦ Ask AI</button>
    </div>
    <div class="filter-bar" style="margin-bottom:14px">
      ${['all','now','later','pass','done','null'].map(f => `
        <button class="filter-btn f-${f} ${currentFilter===f?'active':''}"
          onclick="setFilterAll('${f}')">${f==='all'?'All':f==='null'?'Untagged':f.charAt(0).toUpperCase()+f.slice(1)}</button>`).join('')}
    </div>
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input class="search-input" id="searchBox" placeholder="Search all ideas…" oninput="renderAllIdeas()">
    </div>
    <div id="allIdeasContent"></div>`;
  const q = (document.getElementById('searchBox')||{value:''}).value.toLowerCase();
  const content = document.getElementById('allIdeasContent');
  state.projects.forEach(proj => {
    let ideas = proj.ideas;
    if (currentFilter !== 'all') ideas = ideas.filter(i => currentFilter === 'null' ? !i.status : i.status === currentFilter);
    if (q) ideas = ideas.filter(i => i.title.toLowerCase().includes(q) || (i.desc||'').toLowerCase().includes(q));
    if (!ideas.length) return;
    const grp = document.createElement('div');
    grp.className = 'all-ideas-group';
    grp.innerHTML = `<div class="group-header" onclick="this.parentElement.classList.toggle('group-collapsed')">
      ${proj.icon} ${proj.name} <span class="group-count">${ideas.length}</span></div>
      <div class="ideas-list" id="grp_${proj.id}"></div>`;
    content.appendChild(grp);
    const list = grp.querySelector('.ideas-list');
    ideas.forEach(idea => list.appendChild(makeIdeaCard(idea, proj.id)));
  });
  if (!content.children.length) {
    content.innerHTML = '<div class="empty-state"><div class="big">🔍</div>No ideas match this filter.</div>';
  }
}

function makeIdeaCard(idea, projectId) {
  const card = document.createElement('div');
  card.className = `idea-card${idea.status ? ' status-'+idea.status : ''}`;
  card.id = 'card_' + idea.id;
  const statusIcons = {now:'▶', later:'🔖', pass:'✗', done:'✓', null: '○'};
  const statusLabels = {now:'Start Now', later:'Consider Later', pass:'Pass', done:'Done', null: 'Untagged'};
  card.innerHTML = `
    <div class="idea-main">
      <div class="idea-title" onclick="openEditIdea('${idea.id}','${projectId}')">${idea.title}</div>
      ${idea.desc ? `<div class="idea-desc">${idea.desc}</div>` : ''}
    </div>
    <div class="idea-actions">
      <button class="status-btn ${idea.status ? 's-'+idea.status : ''}" 
        data-tip="${statusLabels[idea.status||'null']}"
        onclick="cycleStatus('${idea.id}','${projectId}')">
        ${statusIcons[idea.status||'null']}
      </button>
      <button class="edit-btn" onclick="openEditIdea('${idea.id}','${projectId}')" title="Edit">✎</button>
    </div>`;
  return card;
}

// ═══════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════
function showView(view) {
  currentView = view;
  currentFilter = 'all';
  render();
}
function showProject(id) {
  currentProjectId = id;
  currentView = 'project';
  currentFilter = 'all';
  render();
}
function setFilter(f) {
  currentFilter = f;
  renderProjectDetail();
}
function setFilterAll(f) {
  currentFilter = f;
  renderAllIdeas();
}

// ═══════════════════════════════════════════
//  STATUS
// ═══════════════════════════════════════════
const STATUS_CYCLE = [null, 'now', 'later', 'pass', 'done'];
function cycleStatus(ideaId, projectId) {
  const proj = state.projects.find(p => p.id === projectId);
  if (!proj) return;
  const idea = proj.ideas.find(i => i.id === ideaId);
  if (!idea) return;
  const idx = STATUS_CYCLE.indexOf(idea.status);
  idea.status = STATUS_CYCLE[(idx + 1) % STATUS_CYCLE.length];
  saveState();
  render();
}
function setStatus(ideaId, projectId, status) {
  const proj = state.projects.find(p => p.id === projectId);
  if (!proj) return;
  const idea = proj.ideas.find(i => i.id === ideaId);
  if (!idea) return;
  idea.status = status === idea.status ? null : status;
  saveState();
  render();
}

// ═══════════════════════════════════════════
//  IDEA MODAL
// ═══════════════════════════════════════════
function openNewIdea(projectId) {
  editingIdeaId = null;
  editingProjectId = projectId;
  selectedStatus = null;
  document.getElementById('modalTitle').textContent = 'New Idea';
  document.getElementById('ideaTitle').value = '';
  document.getElementById('ideaDesc').value = '';
  document.getElementById('deleteBtn').style.display = 'none';
  populateProjectSelect(projectId);
  clearStatusOpts();
  document.getElementById('ideaModal').classList.add('open');
  setTimeout(() => document.getElementById('ideaTitle').focus(), 100);
}
function openEditIdea(ideaId, projectId) {
  const proj = state.projects.find(p => p.id === projectId);
  if (!proj) return;
  const idea = proj.ideas.find(i => i.id === ideaId);
  if (!idea) return;
  editingIdeaId = ideaId;
  editingProjectId = projectId;
  selectedStatus = idea.status;
  document.getElementById('modalTitle').textContent = 'Edit Idea';
  document.getElementById('ideaTitle').value = idea.title;
  document.getElementById('ideaDesc').value = idea.desc || '';
  document.getElementById('deleteBtn').style.display = 'block';
  populateProjectSelect(projectId);
  clearStatusOpts();
  if (idea.status) {
    const opt = document.querySelector(`.status-opt[data-status="${idea.status}"]`);
    if (opt) opt.classList.add('selected-' + idea.status);
  }
  document.getElementById('ideaModal').classList.add('open');
}
function populateProjectSelect(selectedId) {
  const sel = document.getElementById('ideaProject');
  sel.innerHTML = state.projects.map(p => `<option value="${p.id}" ${p.id===selectedId?'selected':''}>${p.icon} ${p.name}</option>`).join('');
}
function clearStatusOpts() {
  document.querySelectorAll('.status-opt').forEach(el => {
    el.className = 'status-opt';
  });
}
function selectStatus(el) {
  clearStatusOpts();
  const s = el.dataset.status;
  selectedStatus = (selectedStatus === s) ? null : s;
  if (selectedStatus) el.classList.add('selected-' + s);
}
function saveIdea() {
  const title = document.getElementById('ideaTitle').value.trim();
  if (!title) { document.getElementById('ideaTitle').focus(); return; }
  const desc = document.getElementById('ideaDesc').value.trim();
  const projId = document.getElementById('ideaProject').value;
  const proj = state.projects.find(p => p.id === projId);
  if (!proj) return;
  if (editingIdeaId) {
    // Move between projects if needed
    const oldProj = state.projects.find(p => p.ideas.find(i => i.id === editingIdeaId));
    if (oldProj && oldProj.id !== projId) {
      const ideaIdx = oldProj.ideas.findIndex(i => i.id === editingIdeaId);
      const [idea] = oldProj.ideas.splice(ideaIdx, 1);
      idea.title = title; idea.desc = desc; idea.status = selectedStatus;
      proj.ideas.push(idea);
    } else {
      const idea = proj.ideas.find(i => i.id === editingIdeaId);
      if (idea) { idea.title = title; idea.desc = desc; idea.status = selectedStatus; }
    }
  } else {
    proj.ideas.push({ id: genId(), title, desc, status: selectedStatus });
  }
  saveState();
  closeIdeaModal();
  render();
}
function deleteIdea() {
  if (!editingIdeaId) return;
  if (!confirm('Delete this idea?')) return;
  state.projects.forEach(p => {
    p.ideas = p.ideas.filter(i => i.id !== editingIdeaId);
  });
  saveState();
  closeIdeaModal();
  render();
}
function closeIdeaModal() {
  document.getElementById('ideaModal').classList.remove('open');
  editingIdeaId = null; editingProjectId = null;
}

// ═══════════════════════════════════════════
//  AI PANEL
// ═══════════════════════════════════════════
function openAI(projectId) {
  aiProjectContext = projectId || currentProjectId;
  const proj = aiProjectContext ? state.projects.find(p => p.id === aiProjectContext) : null;
  document.getElementById('aiContext').textContent = proj
    ? `Context: ${proj.icon} ${proj.name} (${proj.ideas.length} ideas)`
    : 'Context: all projects';
  document.getElementById('aiOverlay').classList.add('open');
  document.getElementById('aiPanel').classList.add('open');
  setTimeout(() => document.getElementById('aiInput').focus(), 300);
}
function closeAI() {
  document.getElementById('aiOverlay').classList.remove('open');
  document.getElementById('aiPanel').classList.remove('open');
}

async function sendToAI() {
  const input = document.getElementById('aiInput');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  addAIMsg('user', msg);
  document.getElementById('aiSendBtn').disabled = true;
  addAIMsg('assistant', '<span class="ai-thinking">Thinking…</span>');
  try {
    const response = await callAI(msg);
    removeLastAssistantMsg();
    addAIMsg('assistant', response.text);
    if (response.suggestions && response.suggestions.length) {
      showSuggestions(response.suggestions, aiProjectContext);
    }
  } catch(e) {
    removeLastAssistantMsg();
    addAIMsg('assistant', '⚠ Could not connect to AI. Check Settings (⚙) and ensure the proxy is running: <code>python3 hub/scripts/serve_brainstorm.py</code>');
  }
  document.getElementById('aiSendBtn').disabled = false;
}

function addAIMsg(role, html) {
  const msgs = document.getElementById('aiMessages');
  const div = document.createElement('div');
  div.className = 'ai-msg ' + role;
  div.innerHTML = html;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}
function removeLastAssistantMsg() {
  const msgs = document.getElementById('aiMessages');
  const all = msgs.querySelectorAll('.ai-msg.assistant');
  if (all.length) all[all.length-1].remove();
}
function showSuggestions(suggestions, projectId) {
  const container = document.getElementById('aiSuggestions');
  container.innerHTML = '<div style="font-size:12px;color:var(--text-muted);margin-bottom:4px">✦ AI Suggestions</div>';
  suggestions.forEach(sug => {
    const card = document.createElement('div');
    card.className = 'ai-suggestion-card';
    card.innerHTML = `<div class="ai-suggestion-text">${sug.title}${sug.desc ? ` — <span style="color:var(--text-muted)">${sug.desc}</span>` : ''}</div>
      <div class="ai-suggestion-actions">
        <button class="sug-add-btn" onclick="addSuggestedIdea('${encodeURIComponent(JSON.stringify(sug))}','${projectId||''}',this.closest('.ai-suggestion-card'))">Add</button>
        <button class="sug-dismiss-btn" onclick="this.closest('.ai-suggestion-card').remove()">✕</button>
      </div>`;
    container.appendChild(card);
  });
}
function addSuggestedIdea(sugJson, projectId, card) {
  const sug = JSON.parse(decodeURIComponent(sugJson));
  const targetId = projectId || state.projects[0].id;
  const proj = state.projects.find(p => p.id === targetId) || state.projects[0];
  proj.ideas.push({id: genId(), title: sug.title, desc: sug.desc || '', status: null});
  saveState();
  card.style.opacity = '0.5';
  card.querySelector('.sug-add-btn').textContent = '✓ Added';
  render();
}

async function callAI(userMessage) {
  const { apiEndpoint, apiToken } = state.settings;
  const proj = aiProjectContext ? state.projects.find(p => p.id === aiProjectContext) : null;
  const contextLines = proj
    ? `Project: ${proj.name}\nExisting ideas:\n${proj.ideas.map(i => `- ${i.title} [${i.status||'untagged'}]`).slice(0,10).join('\n')}`
    : `All projects: ${state.projects.map(p => p.name).join(', ')}`;

  const systemPrompt = `You are DatBotty's brainstorm assistant. You help Crash (an entrepreneur/DJ building an autonomous AI operations system called DatBotty) brainstorm and develop ideas.

${contextLines}

When suggesting ideas, respond with JSON in this exact format:
{"text": "your conversational response here", "suggestions": [{"title": "Short idea title", "desc": "One sentence description"}, ...]}

Keep suggestions concrete and actionable. Max 3-4 suggestions per response. 
If the user is just chatting or asking a question (not asking for ideas), respond with:
{"text": "your response here", "suggestions": []}`;

  const messages = [
    { role: 'system', content: systemPrompt },
    ...aiHistory.slice(-6),
    { role: 'user', content: userMessage }
  ];

  const headers = { 'Content-Type': 'application/json' };
  if (apiToken) headers['Authorization'] = 'Bearer ' + apiToken;

  const res = await fetch(apiEndpoint, {
    method: 'POST',
    headers,
    body: JSON.stringify({
      model: 'gpt-4.1',
      messages,
      max_tokens: 600,
      temperature: 0.8
    })
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();
  const content = data.choices[0].message.content;
  aiHistory.push({role: 'user', content: userMessage});
  aiHistory.push({role: 'assistant', content});
  try {
    return JSON.parse(content);
  } catch {
    return { text: content, suggestions: [] };
  }
}

// ═══════════════════════════════════════════
//  SETTINGS
// ═══════════════════════════════════════════
function showSettings() {
  document.getElementById('settingsEndpoint').value = state.settings.apiEndpoint;
  document.getElementById('settingsToken').value = state.settings.apiToken;
  document.getElementById('testResult').innerHTML = '';
  document.getElementById('settingsModal').classList.add('open');
}
function closeSettings() {
  document.getElementById('settingsModal').classList.remove('open');
}
function saveSettings() {
  state.settings.apiEndpoint = document.getElementById('settingsEndpoint').value.trim();
  state.settings.apiToken = document.getElementById('settingsToken').value.trim();
  saveState();
  closeSettings();
  updateAIStatus();
}
async function testConnection() {
  const endpoint = document.getElementById('settingsEndpoint').value.trim();
  const token = document.getElementById('settingsToken').value.trim();
  const el = document.getElementById('testResult');
  el.innerHTML = '<div class="test-result" style="background:var(--surface2);color:var(--text-muted)">Testing…</div>';
  try {
    const headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = 'Bearer ' + token;
    const res = await fetch(endpoint, {
      method: 'POST', headers,
      body: JSON.stringify({ model: 'gpt-4.1', messages: [{role:'user',content:'Hi'}], max_tokens: 5 })
    });
    if (res.ok) {
      el.innerHTML = '<div class="test-result ok">✓ Connected successfully</div>';
      document.getElementById('aiDot').className = 'ai-dot live';
      document.getElementById('aiStatusText').textContent = 'AI ready';
    } else {
      el.innerHTML = `<div class="test-result fail">✗ HTTP ${res.status} — check endpoint/token</div>`;
    }
  } catch(e) {
    el.innerHTML = `<div class="test-result fail">✗ ${e.message} — is the proxy running?</div>`;
  }
}
function updateAIStatus() {
  // Just reflect saved connection state visually; don't auto-probe
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
loadState();
render();

// Close modals on overlay click
document.getElementById('ideaModal').addEventListener('click', e => { if(e.target === e.currentTarget) closeIdeaModal(); });
document.getElementById('settingsModal').addEventListener('click', e => { if(e.target === e.currentTarget) closeSettings(); });

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeIdeaModal();
    closeSettings();
    closeAI();
  }
});
</script>
