<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DatBotty Brainstorm — Minimal Light</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  :root {
    --bg: #fafaf9;
    --surface: #ffffff;
    --border: #e5e5e3;
    --border-hover: #d0d0cc;
    --text: #1c1b1a;
    --text-2: #4c4b49;
    --text-3: #9b9994;
    --accent: #635bff;
    --accent-bg: #f0effe;
    --green: #16a34a;
    --green-bg: #f0fdf4;
    --amber: #b45309;
    --amber-bg: #fffbeb;
    --red: #dc2626;
    --red-bg: #fef2f2;
    --blue-bg: #eff6ff;
    --blue: #1d4ed8;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    font-family: 'Inter', -apple-system, sans-serif;
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Layout */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    height: 56px;
    display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-size: 15px; font-weight: 700; letter-spacing: -0.4px; }
  .logo span { color: var(--accent); }
  .divider { width: 1px; height: 18px; background: var(--border); }
  .breadcrumb { font-size: 13px; color: var(--text-3); display: flex; align-items: center; gap: 6px; }
  .breadcrumb .crumb { cursor: pointer; }
  .breadcrumb .crumb:hover { color: var(--text-2); }
  .breadcrumb .sep { color: var(--border-hover); }
  .spacer { flex: 1; }
  .header-action {
    font-size: 12px; color: var(--accent); font-weight: 500;
    padding: 6px 12px; border-radius: 6px;
    background: var(--accent-bg); border: none; cursor: pointer;
    font-family: inherit; transition: filter .15s;
  }
  .header-action:hover { filter: brightness(0.95); }

  .sidebar-layout { display: flex; height: calc(100vh - 56px); }
  .sidebar {
    width: 220px; min-width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 12px 8px;
    overflow-y: auto;
  }
  .sidebar-label {
    font-size: 10px; font-weight: 600; color: var(--text-3);
    letter-spacing: 1px; text-transform: uppercase;
    padding: 4px 10px 8px;
  }
  .sidebar-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px; border-radius: var(--radius);
    cursor: pointer; font-size: 13px;
    transition: background .15s;
    color: var(--text-2);
  }
  .sidebar-item:hover { background: var(--bg); }
  .sidebar-item.active { background: var(--bg); color: var(--text); font-weight: 500; }
  .sidebar-item .si-icon { font-size: 14px; flex-shrink: 0; }
  .sidebar-item .si-name { flex: 1; }
  .sidebar-item .si-count {
    font-size: 11px; color: var(--text-3); font-weight: 400;
  }
  .sidebar-item .si-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
    flex-shrink: 0;
  }

  .content { flex: 1; overflow-y: auto; padding: 28px 32px; }
  .page-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .page-sub { font-size: 13px; color: var(--text-3); margin-bottom: 24px; }

  .filter-bar {
    display: flex; gap: 4px; margin-bottom: 20px; align-items: center;
  }
  .filter-chip {
    font-family: inherit; font-size: 12px; font-weight: 500;
    padding: 5px 12px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-3); cursor: pointer; transition: all .15s;
  }
  .filter-chip:hover { border-color: var(--border-hover); color: var(--text-2); }
  .filter-chip.active { border-color: var(--accent); background: var(--accent-bg); color: var(--accent); }
  .filter-sep { flex: 1; }
  .count-badge {
    font-size: 11px; color: var(--text-3); font-weight: 500;
  }

  .ideas-list { display: flex; flex-direction: column; gap: 2px; }
  .idea-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; border-radius: var(--radius);
    background: var(--surface);
    border: 1px solid transparent;
    transition: all .15s; cursor: pointer;
  }
  .idea-row:hover { border-color: var(--border); }
  .idea-checkbox {
    width: 16px; height: 16px; border-radius: 4px;
    border: 1.5px solid var(--border-hover);
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-size: 10px; cursor: pointer; transition: all .15s;
  }
  .idea-checkbox.done { background: var(--green); border-color: var(--green); color: white; }
  .idea-title-col { flex: 1; font-size: 13px; color: var(--text); }
  .idea-title-col.done-text { text-decoration: line-through; color: var(--text-3); }
  .status-badge {
    font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 4px;
    flex-shrink: 0;
  }
  .badge-now { background: var(--green-bg); color: var(--green); }
  .badge-later { background: var(--amber-bg); color: var(--amber); }
  .badge-done { background: var(--bg); color: var(--text-3); }
  .badge-open { background: var(--blue-bg); color: var(--blue); }

  .action-row { display: none; align-items: center; gap: 6px; padding: 6px 12px; }
  .idea-wrap:hover .action-row { display: flex; }
  .idea-wrap { display: contents; }
  .mini-btn {
    font-family: inherit; font-size: 11px; font-weight: 500;
    padding: 3px 8px; border-radius: 5px; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-3); transition: all .15s;
  }
  .mini-btn:hover { background: var(--bg); color: var(--text-2); }
  .mini-btn.s-now:hover { background: var(--green-bg); border-color: rgba(22,163,74,.35); color: var(--green); }
  .mini-btn.s-later:hover { background: var(--amber-bg); border-color: rgba(180,83,9,.3); color: var(--amber); }
  .mini-btn.s-done:hover { background: var(--bg); color: var(--text-3); }
  .mini-btn.active { font-weight: 600; }
  .mini-btn.active.s-now { background: var(--green-bg); border-color: rgba(22,163,74,.4); color: var(--green); }
  .mini-btn.active.s-later { background: var(--amber-bg); border-color: rgba(180,83,9,.35); color: var(--amber); }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-3); font-size: 13px; }
  .empty-icon { font-size: 32px; margin-bottom: 12px; }

  .ai-bar {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 16px; display: flex; align-items: center; gap: 10px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    width: min(600px, calc(100vw - 48px)); z-index: 200;
  }
  .ai-input {
    flex: 1; border: none; outline: none; font-family: inherit; font-size: 13px;
    background: transparent; color: var(--text);
  }
  .ai-input::placeholder { color: var(--text-3); }
  .ai-send {
    background: var(--accent); color: white; border: none;
    border-radius: 8px; padding: 6px 14px; font-family: inherit; font-size: 12px;
    font-weight: 500; cursor: pointer; transition: filter .15s;
  }
  .ai-send:hover { filter: brightness(1.1); }
</style>
</head>
<body>

<header>
  <div class="logo">Dat<span>Botty</span></div>
  <div class="divider"></div>
  <div class="breadcrumb">
    <span class="crumb" onclick="backToProjects()">Projects</span>
    <span class="sep" id="sepEl" style="display:none">/</span>
    <span id="bcProject" style="color:var(--text);font-weight:500"></span>
  </div>
  <div class="spacer"></div>
  <button class="header-action">+ New idea</button>
</header>

<div class="sidebar-layout">
  <nav class="sidebar">
    <div class="sidebar-label">Projects</div>
    <div id="sidebarList"></div>
  </nav>
  <div class="content">
    <div id="projectsOverview" style="display:none">
      <div class="page-title">Overview</div>
      <div class="page-sub">All projects at a glance</div>
    </div>
    <div id="ideasView">
      <div class="page-title" id="ptitle">Select a project</div>
      <div class="page-sub" id="psub">Choose from the sidebar</div>
      <div class="filter-bar" id="filterBar">
        <button class="filter-chip active" onclick="setFilter(this,'all')">All</button>
        <button class="filter-chip" onclick="setFilter(this,'now')">Active</button>
        <button class="filter-chip" onclick="setFilter(this,'later')">Queued</button>
        <button class="filter-chip" onclick="setFilter(this,'done')">Done</button>
        <button class="filter-chip" onclick="setFilter(this,'open')">Open</button>
        <div class="filter-sep"></div>
        <div class="count-badge" id="countBadge"></div>
      </div>
      <div class="ideas-list" id="ideasList">
        <div class="empty-state"><div class="empty-icon">📋</div>Select a project from the sidebar</div>
      </div>
    </div>
  </div>
</div>

<div class="ai-bar">
  <span style="font-size:16px">✦</span>
  <input class="ai-input" placeholder="Ask AI about your ideas…" id="aiInput">
  <button class="ai-send">Ask</button>
</div>

<script>
const PROJECTS = [
  {id:'autonomy',name:'Autonomy',icon:'🤖',ideas:[
    {title:'Self-generated session prompts',status:'done'},{title:'Session uniqueness enforcement',status:'done'},
    {title:'Self-retrospective',status:'later'},{title:'Regression detection',status:'later'},
    {title:'Design Arena integration',status:'now'},{title:'Wire supervisor active flag',status:'now'},
  ]},
  {id:'experience',name:'Daily Experience',icon:'📱',ideas:[
    {title:'Telegram partial re-enable',status:null},{title:'Morning briefing findings',status:'later'},
    {title:'Status page',status:'done'},{title:'Fewer, better notifications',status:'now'},
  ]},
  {id:'business',name:'Business Intel',icon:'💼',ideas:[
    {title:'Affiliate opportunity scanner',status:'done'},{title:'Content calendar',status:null},
    {title:'SEO keyword tracker',status:'done'},{title:'Revenue dashboard',status:'later'},
  ]},
  {id:'capabilities',name:'New Capabilities',icon:'⚡',ideas:[
    {title:'Image & screenshot analysis',status:'now'},{title:'External model consultation',status:'now'},
    {title:'Automatic skill discovery',status:'done'},{title:'n8n health scoring',status:'done'},
  ]},
  {id:'home',name:'Home Automation',icon:'🏠',ideas:[
    {title:'Home Assistant connection',status:'later'},{title:'Morning activation',status:null},
    {title:'Server health to HA',status:'later'},
  ]},
  {id:'dj',name:'DJ Intelligence',icon:'🎧',ideas:[
    {title:'New release tracker',status:null},{title:'Trending tracks radar',status:'later'},
    {title:'DJ set generator v2',status:'later'},
  ]},
  {id:'infra',name:'Infrastructure',icon:'🔧',ideas:[
    {title:'Automated daily backup',status:'later'},{title:'Docker health watchdog',status:'later'},
    {title:'Pop-out window targeting',status:'now'},
  ]},
  {id:'intel',name:'Research',icon:'🔬',ideas:[
    {title:'Curated news digest',status:null},{title:'AI capability tracking',status:'done'},
  ]},
  {id:'experimental',name:'Experimental',icon:'🚀',ideas:[
    {title:'Voice-activated queries',status:'now'},{title:'Crash digital twin',status:'now'},
    {title:'North Star document',status:'done'},{title:'Brainstorm app',status:'done'},
  ]},
];

let filter = 'all', currentId = null;

function renderSidebar() {
  document.getElementById('sidebarList').innerHTML = PROJECTS.map(p => {
    const active = p.ideas.filter(i=>i.status==='now').length;
    return `<div class="sidebar-item ${p.id===currentId?'active':''}" onclick="showProject('${p.id}')">
      <span class="si-icon">${p.icon}</span>
      <span class="si-name">${p.name}</span>
      ${active ? `<span class="si-dot"></span>` : `<span class="si-count">${p.ideas.length}</span>`}
    </div>`;
  }).join('');
}

function showProject(id) {
  currentId = id; filter = 'all';
  const p = PROJECTS.find(x=>x.id===id);
  document.getElementById('ptitle').textContent = p.name;
  const active = p.ideas.filter(i=>i.status==='now').length;
  document.getElementById('psub').textContent = `${p.ideas.length} ideas · ${active} active`;
  document.getElementById('sepEl').style.display = 'inline';
  document.getElementById('bcProject').textContent = p.name;
  document.querySelectorAll('.filter-chip').forEach((b,i)=>b.classList.toggle('active',i===0));
  renderSidebar();
  renderIdeas();
}
function backToProjects() {
  currentId = null;
  document.getElementById('bcProject').textContent = '';
  document.getElementById('sepEl').style.display = 'none';
  renderSidebar();
  document.getElementById('ideasList').innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div>Select a project from the sidebar</div>';
}
function setFilter(btn, f) {
  document.querySelectorAll('.filter-chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); filter = f; renderIdeas();
}
function setStatus(projId, idx, status) {
  const proj = PROJECTS.find(p=>p.id===projId);
  proj.ideas[idx].status = proj.ideas[idx].status === status ? null : status;
  renderIdeas(); renderSidebar();
}

function renderIdeas() {
  const proj = PROJECTS.find(p=>p.id===currentId);
  if(!proj) return;
  let ideas = proj.ideas.map((i,n)=>({...i,_n:n}));
  if(filter==='now') ideas = ideas.filter(i=>i.status==='now');
  else if(filter==='later') ideas = ideas.filter(i=>i.status==='later');
  else if(filter==='done') ideas = ideas.filter(i=>i.status==='done');
  else if(filter==='open') ideas = ideas.filter(i=>!i.status);
  document.getElementById('countBadge').textContent = `${ideas.length} item${ideas.length===1?'':'s'}`;
  const badgeMap = {now:'<span class="status-badge badge-now">Active</span>',later:'<span class="status-badge badge-later">Queued</span>',done:'<span class="status-badge badge-done">Complete</span>'};
  document.getElementById('ideasList').innerHTML = ideas.length ? ideas.map(i => `
    <div class="idea-row">
      <div class="idea-checkbox ${i.status==='done'?'done':''}" onclick="setStatus('${currentId}',${i._n},'done')">${i.status==='done'?'✓':''}</div>
      <div class="idea-title-col ${i.status==='done'?'done-text':''}">${i.title}</div>
      ${i.status && badgeMap[i.status] ? badgeMap[i.status] : (!i.status?'<span class="status-badge badge-open">Open</span>':'')}
      <button class="mini-btn s-now ${i.status==='now'?'active':''}" onclick="event.stopPropagation();setStatus('${currentId}',${i._n},'now')">Start</button>
      <button class="mini-btn s-later ${i.status==='later'?'active':''}" onclick="event.stopPropagation();setStatus('${currentId}',${i._n},'later')">Queue</button>
    </div>`) .join('') : '<div class="empty-state"><div class="empty-icon">✓</div>Nothing here</div>';
}

renderSidebar();
</script>
</body>
</html>
