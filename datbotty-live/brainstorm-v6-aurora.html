<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DatBotty Brainstorm — Aurora</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
  :root {
    --bg: #060910;
    --surface: rgba(255,255,255,0.03);
    --surface-hover: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.08);
    --border-glow: rgba(100,220,200,0.3);
    --teal: #64dcc8;
    --violet: #b17dff;
    --rose: #ff6eb4;
    --gold: #ffd666;
    --text: rgba(255,255,255,0.9);
    --text-muted: rgba(255,255,255,0.5);
    --text-dim: rgba(255,255,255,0.28);
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
    color: var(--text);
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }
  /* Aurora effect */
  body::before {
    content: '';
    position: fixed; top: -40vh; left: -20vw; right: -20vw; height: 80vh;
    background:
      radial-gradient(ellipse 70% 60% at 30% 50%, rgba(100,220,200,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 70% 40%, rgba(177,125,255,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 50% 70%, rgba(255,110,180,0.04) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
    animation: drift 12s ease-in-out infinite alternate;
  }
  @keyframes drift {
    0% { transform: translateX(0) scale(1); }
    100% { transform: translateX(2%) scale(1.03); }
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: rgba(100,220,200,0.2); border-radius: 4px; }

  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(6,9,16,0.8);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 16px 28px;
    display: flex; align-items: center; gap: 16px;
  }
  .logo-text {
    font-size: 17px; font-weight: 700; letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--teal) 0%, var(--violet) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .spacer { flex: 1; }
  .header-btn {
    font-family: inherit; font-size: 12px; font-weight: 600;
    padding: 7px 16px; border-radius: 20px; cursor: pointer;
    background: linear-gradient(135deg, rgba(100,220,200,0.12), rgba(177,125,255,0.12));
    border: 1px solid rgba(100,220,200,0.2);
    color: var(--teal); letter-spacing: 0.3px;
    transition: all .25s;
  }
  .header-btn:hover { 
    background: linear-gradient(135deg, rgba(100,220,200,0.2), rgba(177,125,255,0.2));
    border-color: var(--teal); box-shadow: 0 0 16px rgba(100,220,200,0.15);
  }

  .layout { display: flex; height: calc(100vh - 65px); position: relative; z-index: 1; }
  .sidebar {
    width: 240px; min-width: 240px; padding: 16px 12px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
  }
  .sidebar-group-label {
    font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
    color: var(--text-dim); text-transform: uppercase;
    padding: 6px 10px 8px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 10px; cursor: pointer;
    font-size: 13px; font-weight: 500; color: var(--text-muted);
    transition: all .2s; margin-bottom: 2px;
  }
  .nav-item:hover { background: var(--surface-hover); color: var(--text); }
  .nav-item.active {
    background: linear-gradient(135deg, rgba(100,220,200,0.1), rgba(177,125,255,0.1));
    color: var(--teal);
    border: 1px solid rgba(100,220,200,0.18);
  }
  .nav-icon { font-size: 15px; }
  .nav-label { flex: 1; }
  .nav-badge {
    font-size: 10px; font-weight: 700; min-width: 18px; height: 18px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(100,220,200,0.18); color: var(--teal);
    border-radius: 9px; padding: 0 5px;
  }

  .main { flex: 1; overflow-y: auto; padding: 28px 32px 96px; }
  .page-eyebrow {
    font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--teal); margin-bottom: 6px;
  }
  .page-headline { font-size: 22px; font-weight: 700; margin-bottom: 2px; letter-spacing: -0.3px; }
  .page-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }

  /* Filter tabs */
  .tabs { display: flex; gap: 2px; margin-bottom: 20px; background: var(--surface); border-radius: 12px; padding: 3px; width: fit-content; border: 1px solid var(--border); }
  .tab {
    font-family: inherit; font-size: 12px; font-weight: 500;
    padding: 6px 14px; border-radius: 9px; cursor: pointer;
    background: transparent; border: none; color: var(--text-muted);
    transition: all .2s; letter-spacing: 0.2px;
  }
  .tab:hover { color: var(--text); }
  .tab.active { background: var(--surface-hover); color: var(--teal); font-weight: 600; }

  /* Cards */
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
  .idea-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    cursor: pointer;
    transition: all .25s cubic-bezier(.4,0,.2,1);
    position: relative; overflow: hidden;
  }
  .idea-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(100,220,200,0.3), transparent);
    opacity: 0; transition: opacity .25s;
  }
  .idea-card:hover { background: var(--surface-hover); border-color: rgba(100,220,200,0.2); transform: translateY(-2px); }
  .idea-card:hover::before { opacity: 1; }
  .idea-card.status-now { border-color: rgba(100,220,200,0.25); }
  .idea-card.status-later { border-color: rgba(255,214,102,0.2); }
  .idea-card.status-done { opacity: 0.5; }

  .idea-status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    margin-bottom: 12px;
  }
  .dot-now { background: var(--teal); box-shadow: 0 0 6px rgba(100,220,200,0.5); }
  .dot-later { background: var(--gold); }
  .dot-done { background: var(--text-dim); }
  .dot-open { background: var(--border); }

  .idea-name { font-size: 13px; font-weight: 600; margin-bottom: 14px; line-height: 1.45; }
  .idea-btns { display: flex; gap: 6px; flex-wrap: wrap; }
  .idea-btn {
    font-family: inherit; font-size: 11px; font-weight: 600;
    padding: 4px 10px; border-radius: 6px; cursor: pointer;
    border: 1px solid var(--border); background: transparent;
    color: var(--text-muted); transition: all .2s; letter-spacing: 0.3px;
  }
  .idea-btn.now:hover,.idea-btn.now.active { background: rgba(100,220,200,0.12); border-color: rgba(100,220,200,0.35); color: var(--teal); }
  .idea-btn.later:hover,.idea-btn.later.active { background: rgba(255,214,102,0.1); border-color: rgba(255,214,102,0.3); color: var(--gold); }
  .idea-btn.pass:hover { background: rgba(255,110,180,0.08); border-color: rgba(255,110,180,0.25); color: var(--rose); }
  .idea-btn.done:hover,.idea-btn.done.active { background: rgba(255,255,255,0.05); color: var(--text-dim); }

  /* Proj cards (home view) */
  .proj-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: 10px; }
  .proj-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px 20px;
    cursor: pointer; transition: all .25s;
  }
  .proj-card:hover { background: var(--surface-hover); border-color: rgba(177,125,255,0.25); transform: translateY(-2px); }
  .proj-card .pc-icon { font-size: 24px; margin-bottom: 10px; }
  .proj-card .pc-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .proj-card .pc-sub { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; }
  .proj-progress { height: 2px; background: rgba(255,255,255,0.07); border-radius: 2px; }
  .proj-progress-fill { height: 2px; border-radius: 2px;
    background: linear-gradient(90deg, var(--teal), var(--violet)); }

  /* AI bar */
  .ai-drawer {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(6,9,16,0.9); backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    padding: 14px 28px;
    display: flex; align-items: center; gap: 12px;
    z-index: 200;
  }
  .ai-icon { font-size: 18px; flex-shrink: 0; }
  .ai-inp {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 9px 14px; font-family: inherit; font-size: 13px;
    color: var(--text); outline: none; max-width: 600px;
    transition: border-color .2s;
  }
  .ai-inp::placeholder { color: var(--text-dim); }
  .ai-inp:focus { border-color: rgba(100,220,200,0.35); }
  .ai-send {
    font-family: inherit; font-size: 12px; font-weight: 700;
    padding: 8px 18px; border-radius: 10px; cursor: pointer;
    background: linear-gradient(135deg, var(--teal), var(--violet));
    border: none; color: #fff; letter-spacing: 0.4px;
    transition: opacity .2s; flex-shrink: 0;
  }
  .ai-send:hover { opacity: 0.88; }
</style>
</head>
<body>

<header>
  <div class="logo-text">DatBotty ✦</div>
  <div style="font-size:12px;color:var(--text-dim)">Brainstorm Studio</div>
  <div class="spacer"></div>
  <button class="header-btn">+ Add idea</button>
</header>

<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-group-label">Projects</div>
    <div id="navList"></div>
  </nav>

  <div class="main" id="mainContent">
    <!-- Home view injected here -->
  </div>
</div>

<div class="ai-drawer">
  <div class="ai-icon">✦</div>
  <input class="ai-inp" placeholder="Ask AI about your brainstorm…" id="aiInp">
  <button class="ai-send">Ask</button>
</div>

<script>
const PROJECTS = [
  {id:'autonomy',name:'Autonomy',icon:'🤖',color:'teal',ideas:[
    {t:'Self-generated session prompts',s:'done'},{t:'Session uniqueness enforcement',s:'done'},
    {t:'Self-retrospective',s:'later'},{t:'Regression detection',s:'later'},
    {t:'Design Arena integration',s:'now'},{t:'Wire supervisor active flag',s:'now'},
  ]},
  {id:'experience',name:'Daily Experience',icon:'📱',color:'violet',ideas:[
    {t:'Telegram partial re-enable',s:null},{t:'Morning briefing findings',s:'later'},
    {t:'Status page',s:'done'},{t:'Fewer, better notifications',s:'now'},
  ]},
  {id:'business',name:'Business Intel',icon:'💼',color:'gold',ideas:[
    {t:'Affiliate opportunity scanner',s:'done'},{t:'Content calendar',s:null},
    {t:'SEO keyword tracker',s:'done'},{t:'Revenue dashboard',s:'later'},
  ]},
  {id:'capabilities',name:'Capabilities',icon:'⚡',color:'teal',ideas:[
    {t:'Image & screenshot analysis',s:'now'},{t:'External model consultation',s:'now'},
    {t:'Automatic skill discovery',s:'done'},{t:'n8n health scoring',s:'done'},
  ]},
  {id:'home',name:'Home Automation',icon:'🏠',color:'rose',ideas:[
    {t:'Home Assistant connection',s:'later'},{t:'Morning activation',s:null},
    {t:'Server health to HA',s:'later'},
  ]},
  {id:'dj',name:'DJ Intelligence',icon:'🎧',color:'violet',ideas:[
    {t:'New release tracker',s:null},{t:'Trending tracks radar',s:'later'},
    {t:'DJ set generator v2',s:'later'},
  ]},
  {id:'infra',name:'Infrastructure',icon:'🔧',color:'gold',ideas:[
    {t:'Automated daily backup',s:'later'},{t:'Docker health watchdog',s:'later'},
    {t:'Pop-out window targeting',s:'now'},
  ]},
  {id:'intel',name:'Research',icon:'🔬',color:'teal',ideas:[
    {t:'Curated news digest',s:null},{t:'AI capability tracking',s:'done'},
  ]},
  {id:'experimental',name:'Experimental',icon:'🚀',color:'rose',ideas:[
    {t:'Voice-activated queries',s:'now'},{t:'Crash digital twin',s:'now'},
    {t:'North Star document',s:'done'},{t:'Brainstorm app',s:'done'},
  ]},
];

let currentId = null, filter = 'all';

function renderNav() {
  document.getElementById('navList').innerHTML = PROJECTS.map(p => {
    const active = p.ideas.filter(i=>i.s==='now').length;
    return `<div class="nav-item ${p.id===currentId?'active':''}" onclick="showProject('${p.id}')">
      <span class="nav-icon">${p.icon}</span>
      <span class="nav-label">${p.name}</span>
      ${active ? `<span class="nav-badge">${active}</span>` : ''}
    </div>`;
  }).join('');
}

function showHome() {
  currentId = null;
  document.getElementById('mainContent').innerHTML = `
    <div class="page-eyebrow">Brainstorm Studio</div>
    <div class="page-headline">All Projects</div>
    <div class="page-sub">${PROJECTS.length} projects · ${PROJECTS.flatMap(p=>p.ideas).filter(i=>i.s==='now').length} ideas active</div>
    <div class="proj-cards">
    ${PROJECTS.map(p=>{
      const done = p.ideas.filter(i=>i.s==='done').length;
      const pct = Math.round(done/p.ideas.length*100);
      return `<div class="proj-card" onclick="showProject('${p.id}')">
        <div class="pc-icon">${p.icon}</div>
        <div class="pc-name">${p.name}</div>
        <div class="pc-sub">${p.ideas.length} ideas · ${done} done</div>
        <div class="proj-progress"><div class="proj-progress-fill" style="width:${pct}%"></div></div>
      </div>`;
    }).join('')}
    </div>`;
  renderNav();
}

function showProject(id) {
  currentId = id; filter = 'all';
  const p = PROJECTS.find(x=>x.id===id);
  renderNav();
  renderProjectView(p);
}

function renderProjectView(p) {
  const stats = ['all','now','later','done','open'].map(f => {
    if(f==='all') return {f,label:'All',count:p.ideas.length};
    if(f==='open') return {f,label:'Open',count:p.ideas.filter(i=>!i.s).length};
    return {f,label:{now:'Active',later:'Queued',done:'Done'}[f],count:p.ideas.filter(i=>i.s===f).length};
  });
  const views = {now:stats[1].count,later:stats[2].count,done:stats[3].count};
  document.getElementById('mainContent').innerHTML = `
    <div class="page-eyebrow">${p.icon} ${p.name}</div>
    <div class="page-headline">Ideas</div>
    <div class="page-sub">${p.ideas.length} total · ${views.now} active · ${views.done} done</div>
    <div class="tabs">
      ${stats.map((s,i)=>`<button class="tab ${filter===s.f?'active':''}" onclick="setFilter('${s.f}')">${s.label} <span style="opacity:.6;font-weight:400">${s.count}</span></button>`).join('')}
    </div>
    <div class="cards" id="cardsGrid"></div>`;
  renderCards(p);
}

function setFilter(f) {
  filter = f;
  const p = PROJECTS.find(x=>x.id===currentId);
  renderProjectView(p);
}

function setStatus(id, idx, s) {
  const p = PROJECTS.find(x=>x.id===id);
  p.ideas[idx].s = p.ideas[idx].s === s ? null : s;
  renderProjectView(p); renderNav();
}

function renderCards(p) {
  let ideas = p.ideas.map((i,n)=>({...i,_n:n}));
  if(filter==='now') ideas = ideas.filter(i=>i.s==='now');
  else if(filter==='later') ideas = ideas.filter(i=>i.s==='later');
  else if(filter==='done') ideas = ideas.filter(i=>i.s==='done');
  else if(filter==='open') ideas = ideas.filter(i=>!i.s);
  const g = document.getElementById('cardsGrid');
  g.innerHTML = ideas.map(i=>{
    const dotClass = {now:'dot-now',later:'dot-later',done:'dot-done',null:'dot-open'}[i.s||'null'];
    return `<div class="idea-card status-${i.s||'open'}">
      <div class="idea-status-dot ${dotClass}"></div>
      <div class="idea-name">${i.t}</div>
      <div class="idea-btns">
        <button class="idea-btn now ${i.s==='now'?'active':''}" onclick="setStatus('${p.id}',${i._n},'now')">Start</button>
        <button class="idea-btn later ${i.s==='later'?'active':''}" onclick="setStatus('${p.id}',${i._n},'later')">Queue</button>
        <button class="idea-btn pass" onclick="this.closest('.idea-card').style.display='none'">Pass</button>
        <button class="idea-btn done ${i.s==='done'?'active':''}" onclick="setStatus('${p.id}',${i._n},'done')">Done ✓</button>
      </div>
    </div>`;
  }).join('') || '<div style="color:var(--text-dim);font-size:13px;padding:20px;grid-column:1/-1">Nothing here.</div>';
}

showHome();
</script>
</body>
</html>
