<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OffbeatDJ — All Design Variants</title>
<style>
  :root{--bg:#0a0a0f;--surface:#13131a;--accent:#7c3aed;--accent2:#06b6d4}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:#e2e8f0;font-family:Inter,sans-serif;padding:2rem}
  h1{font-size:2rem;color:var(--accent2);margin-bottom:.5rem}
  .sub{color:#94a3b8;font-size:.9rem;margin-bottom:2rem}
  .variant-group{background:var(--surface);border-radius:12px;padding:1.5rem;
                  margin-bottom:2rem;border:1px solid #1e1e2e}
  h2{font-size:1.3rem;color:#e2e8f0;margin-bottom:.4rem}
  .url a{color:var(--accent2);font-size:.85rem;text-decoration:none}
  .options{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:1rem}
  figure figcaption{font-size:.8rem;color:var(--accent);margin-bottom:.4rem}
  figure img{width:100%;border-radius:8px;border:1px solid #2e2e3e}
  @media(max-width:700px){.options{grid-template-columns:1fr}}
</style>
</head>
<body>
<h1>OffbeatDJ — Design Variants</h1>

  <div class="variant-group">
