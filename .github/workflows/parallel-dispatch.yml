name: Parallel Cloud Agent Dispatch

# ⚠️ BUDGET FREEZE (2026-04-16): All scheduled dispatch SUSPENDED.
# offbeat-website is a TEST SUBJECT — burning 48 premium cloud agent requests/day
# for a test subject during budget freeze is prohibited (copilot-instructions.md Rule #20).
# Manual dispatch via workflow_dispatch is still available when Crash explicitly requests it.
# To re-enable, uncomment the schedule and pull_request triggers below.

on:
  # SUSPENDED: scheduled runs (was 8x/day × 6 slots = 48 tasks/day)
  # schedule:
  #   - cron: '0 2 * * *'   # 10:00 PM ET
  #   - cron: '0 5 * * *'   # 1:00 AM ET
  #   - cron: '0 8 * * *'   # 4:00 AM ET
  #   - cron: '0 11 * * *'  # 7:00 AM ET
  #   - cron: '0 14 * * *'  # 10:00 AM ET
  #   - cron: '0 17 * * *'  # 1:00 PM ET
  #   - cron: '0 20 * * *'  # 4:00 PM ET
  #   - cron: '0 23 * * *'  # 7:00 PM ET
  # SUSPENDED: PR cascade (was firing 4 extra slots on every merged copilot/* PR)
  # pull_request:
  #   types: [closed]
  #   branches: [main]
  workflow_dispatch:
    inputs:
      slots:
        description: 'Number of parallel tasks to dispatch (1–6)'
        required: false
        default: '1'
        type: choice
        options: ['1', '2', '3', '4', '5', '6']

jobs:
  parallel-dispatch:
    # BUDGET FREEZE: only manual dispatch allowed
    if: github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        slot: [0, 1, 2, 3, 4, 5]
      fail-fast: false   # one failure must never cancel the others
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout (needed for task pool)
        uses: actions/checkout@v4

      - name: Skip extra slots based on trigger type
        id: check-slot
        env:
          REQUESTED_SLOTS: ${{ inputs.slots || '6' }}
          SLOT: ${{ matrix.slot }}
          EVENT: ${{ github.event_name }}
        run: |
          # PR-merge cascade: fire 4 slots (keeps pipeline continuously fed)
          if [ "$EVENT" = "pull_request" ] && [ "$SLOT" -ge "4" ]; then
            echo "Skipping slot $SLOT for PR-merge trigger (max 4 slots)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          # On manual dispatch, only run up to the requested number of slots
          elif [ "$EVENT" = "workflow_dispatch" ] && [ "$SLOT" -ge "$REQUESTED_SLOTS" ]; then
            echo "Skipping slot $SLOT (requested $REQUESTED_SLOTS slots)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch task for slot ${{ matrix.slot }}
        if: steps.check-slot.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLOT: ${{ matrix.slot }}
        run: |
          TOTAL=$(jq 'length' .github/task-pool.json)
          # Epoch-based rotation: each 3-hour block × 6 slots = unique task per slot per run.
          # With 42+ task pool: no repeats within a ~2-day window.
          # 8 runs/day × 6 slots = 48 unique task dispatches per day (public repo: unlimited).
          EPOCH=$(date +%s)
          THREE_HOUR_BLOCK=$((EPOCH / 10800))
          NUM_SLOTS=6
          IDX=$(( (THREE_HOUR_BLOCK * NUM_SLOTS + SLOT) % TOTAL ))

          TITLE=$(jq -r ".[$IDX].title" .github/task-pool.json)
          BODY=$(jq -r ".[$IDX].body" .github/task-pool.json)

          echo "Slot $SLOT | Pool idx $IDX / $TOTAL | Task: $TITLE"

          ISSUE=$(gh api "repos/${{ github.repository }}/issues" \
            --method POST \
            --field "title=$TITLE" \
            --field "body=$BODY" \
            --field "labels[]=datbotty-task" \
            --jq '{number: .number, url: .html_url, node_id: .node_id}' 2>/dev/null || \
          gh api "repos/${{ github.repository }}/issues" \
            --method POST \
            --field "title=$TITLE" \
            --field "body=$BODY" \
            --jq '{number: .number, url: .html_url, node_id: .node_id}')

          ISSUE_NUM=$(echo "$ISSUE" | jq -r '.number')
          ISSUE_URL=$(echo "$ISSUE" | jq -r '.url')
          ISSUE_NODE_ID=$(echo "$ISSUE" | jq -r '.node_id')

          # Assign to Copilot cloud agent via GraphQL
          gh api graphql -f query="mutation {
            addAssigneesToAssignable(input: {
              assignableId: \"$ISSUE_NODE_ID\",
              assigneeIds: [\"BOT_kgDOC9w8XQ\"]
            }) { assignable { ... on Issue { number } } }
          }" 2>/dev/null || true

          echo "✅ Issue #$ISSUE_NUM dispatched: $ISSUE_URL"
          echo "## Slot ${{ matrix.slot }}: $TITLE" >> $GITHUB_STEP_SUMMARY
          echo "- **Issue**: $ISSUE_URL" >> $GITHUB_STEP_SUMMARY
          echo "- **Pool index**: $IDX / $TOTAL" >> $GITHUB_STEP_SUMMARY
