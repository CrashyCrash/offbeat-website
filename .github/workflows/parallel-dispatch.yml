name: Parallel Cloud Agent Dispatch

# Run multiple cloud agent tasks simultaneously for higher throughput.
# Uses matrix strategy: 4 parallel jobs, each picking a DIFFERENT task from the pool.
# Runs 4x/day = up to 16 tasks/day dispatched vs. the old 3/day.
# Also fires on every merged Copilot PR to keep pipeline continuously full.

on:
  schedule:
    - cron: '0 5 * * *'   # 1:00 AM ET  — overnight build burst
    - cron: '0 11 * * *'  # 7:00 AM ET  — morning burst
    - cron: '0 17 * * *'  # 1:00 PM ET  — afternoon burst
    - cron: '0 23 * * *'  # 7:00 PM ET  — evening burst
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      slots:
        description: 'Number of parallel tasks to dispatch (1–4)'
        required: false
        default: '4'
        type: choice
        options: ['1', '2', '3', '4']

jobs:
  parallel-dispatch:
    # On PR events, only fire when a copilot/* branch is merged (not every PR)
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.merged == true &&
       startsWith(github.event.pull_request.head.ref, 'copilot/'))
    strategy:
      matrix:
        slot: [0, 1, 2, 3]
      fail-fast: false   # one failure shouldn't cancel the others
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout (needed for task pool)
        uses: actions/checkout@v4

      - name: Skip extra slots on manual dispatch
        id: check-slot
        env:
          REQUESTED_SLOTS: ${{ inputs.slots || '4' }}
          SLOT: ${{ matrix.slot }}
          EVENT: ${{ github.event_name }}
        run: |
          # PR-merge triggers run 2 slots only (just enough to keep the pipeline fed)
          if [ "$EVENT" = "pull_request" ] && [ "$SLOT" -ge "2" ]; then
            echo "Skipping slot $SLOT for PR-merge trigger (max 2 slots)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          # On manual dispatch, only run up to the requested number of slots
          elif [ "$EVENT" = "workflow_dispatch" ] && [ "$SLOT" -ge "$REQUESTED_SLOTS" ]; then
            echo "Skipping slot $SLOT (requested $REQUESTED_SLOTS slots)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch task for slot ${{ matrix.slot }}
        if: steps.check-slot.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLOT: ${{ matrix.slot }}
        run: |
          TOTAL=$(jq 'length' .github/task-pool.json)
          # Use epoch-based rotation: each 6-hour block × 4 slots = unique task per slot per run.
          # With 30+ task pool: no repeats within a ~7-day window.
          EPOCH=$(date +%s)
          SIX_HOUR_BLOCK=$((EPOCH / 21600))
          NUM_SLOTS=4
          IDX=$(( (SIX_HOUR_BLOCK * NUM_SLOTS + SLOT) % TOTAL ))

          TITLE=$(jq -r ".[$IDX].title" .github/task-pool.json)
          BODY=$(jq -r ".[$IDX].body" .github/task-pool.json)

          echo "Slot $SLOT | Pool idx $IDX / $TOTAL | Task: $TITLE"

          ISSUE=$(gh api "repos/${{ github.repository }}/issues" \
            --method POST \
            --field "title=$TITLE" \
            --field "body=$BODY" \
            --field "labels[]=datbotty-task" \
            --jq '{number: .number, url: .html_url, node_id: .node_id}' 2>/dev/null || \
          gh api "repos/${{ github.repository }}/issues" \
            --method POST \
            --field "title=$TITLE" \
            --field "body=$BODY" \
            --jq '{number: .number, url: .html_url, node_id: .node_id}')

          ISSUE_NUM=$(echo "$ISSUE" | jq -r '.number')
          ISSUE_URL=$(echo "$ISSUE" | jq -r '.url')
          ISSUE_NODE_ID=$(echo "$ISSUE" | jq -r '.node_id')

          # Assign to Copilot cloud agent via GraphQL
          gh api graphql -f query="mutation {
            addAssigneesToAssignable(input: {
              assignableId: \"$ISSUE_NODE_ID\",
              assigneeIds: [\"BOT_kgDOC9w8XQ\"]
            }) { assignable { ... on Issue { number } } }
          }" 2>/dev/null || true

          echo "✅ Issue #$ISSUE_NUM dispatched: $ISSUE_URL"
          echo "## Slot ${{ matrix.slot }}: $TITLE" >> $GITHUB_STEP_SUMMARY
          echo "- **Issue**: $ISSUE_URL" >> $GITHUB_STEP_SUMMARY
          echo "- **Pool index**: $IDX / $TOTAL" >> $GITHUB_STEP_SUMMARY
