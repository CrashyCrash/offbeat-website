name: Dispatch Cloud Agent Task

on:
  schedule:
    # 3x/day — offset from datbotty briefings
    - cron: '30 12 * * *'   # 8:30 AM ET
    - cron: '30 19 * * *'   # 3:30 PM ET
    - cron: '30 2 * * *'    # 10:30 PM ET
  workflow_dispatch:
    inputs:
      title:
        description: 'Issue title / task for the Cloud Agent'
        required: true
        type: string
      body:
        description: 'Detailed task description'
        required: false
        type: string
        default: ''

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout (needed for task pool)
        uses: actions/checkout@v4

      - name: Dispatch manual task
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TASK_TITLE: ${{ inputs.title }}
          TASK_BODY: ${{ inputs.body }}
        run: |
          BODY="$TASK_BODY"
          if [ -z "$BODY" ]; then
            BODY="Automated task dispatched by DatBotty GitHub Actions."
          fi

          ISSUE=$(gh api "repos/${{ github.repository }}/issues" \
            --method POST \
            --field "title=$TASK_TITLE" \
            --field "body=$BODY" \
            --jq '{number: .number, url: .html_url, node_id: .node_id}')

          ISSUE_NUM=$(echo "$ISSUE" | jq -r '.number')
          ISSUE_URL=$(echo "$ISSUE" | jq -r '.url')
          ISSUE_NODE_ID=$(echo "$ISSUE" | jq -r '.node_id')

          gh api graphql -f query="mutation { addAssigneesToAssignable(input: { assignableId: \"$ISSUE_NODE_ID\", assigneeIds: [\"BOT_kgDOC9w8XQ\"] }) { assignable { ... on Issue { number } } } }" 2>/dev/null || true

          echo "Issue #$ISSUE_NUM created: $ISSUE_URL"
          echo "## Cloud Agent Dispatched" >> $GITHUB_STEP_SUMMARY
          echo "- **Task**: $TASK_TITLE" >> $GITHUB_STEP_SUMMARY
          echo "- **Issue**: $ISSUE_URL" >> $GITHUB_STEP_SUMMARY

      - name: Scheduled dispatch — rotating website task
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Pick task from .github/task-pool.json using day+slot rotation
          # Spreads 18 tasks across the month — no repeats within a 6-day window
          TOTAL=$(jq 'length' .github/task-pool.json)
          DAY=$(date -u +%d | sed 's/^0//')
          HOUR=$(date -u +%H)
          if   [ "$HOUR" -le 14 ]; then SLOT=0
          elif [ "$HOUR" -le 21 ]; then SLOT=1
          else SLOT=2
          fi
          IDX=$(( (DAY * 3 + SLOT) % TOTAL ))

          TITLE=$(jq -r ".[$IDX].title" .github/task-pool.json)
          BODY=$(jq -r ".[$IDX].body" .github/task-pool.json)

          echo "Task pool: $TOTAL tasks | Day: $DAY | Slot: $SLOT | Index: $IDX"
          echo "Dispatching: $TITLE"

          ISSUE=$(gh api "repos/${{ github.repository }}/issues" \
            --method POST \
            --field "title=$TITLE" \
            --field "body=$BODY" \
            --field "labels[]=datbotty-task" \
            --jq '{number: .number, url: .html_url, node_id: .node_id}' 2>/dev/null || \
          gh api "repos/${{ github.repository }}/issues" \
            --method POST \
            --field "title=$TITLE" \
            --field "body=$BODY" \
            --jq '{number: .number, url: .html_url, node_id: .node_id}')

          ISSUE_NUM=$(echo "$ISSUE" | jq -r '.number')
          ISSUE_URL=$(echo "$ISSUE" | jq -r '.url')
          ISSUE_NODE_ID=$(echo "$ISSUE" | jq -r '.node_id')

          gh api graphql -f query="mutation { addAssigneesToAssignable(input: { assignableId: \"$ISSUE_NODE_ID\", assigneeIds: [\"BOT_kgDOC9w8XQ\"] }) { assignable { ... on Issue { number } } } }" 2>/dev/null || true

          echo "Issue #$ISSUE_NUM created: $ISSUE_URL"
          echo "## Scheduled Cloud Agent Task (pool index $IDX / $TOTAL)" >> $GITHUB_STEP_SUMMARY
          echo "- **Time (UTC)**: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "- **Task**: $TITLE" >> $GITHUB_STEP_SUMMARY
          echo "- **Issue**: $ISSUE_URL" >> $GITHUB_STEP_SUMMARY
