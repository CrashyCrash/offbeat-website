name: Cleanup Old Artifacts & Workflow Runs

# Runs daily to keep Actions storage well under the 500 MB limit.
# github-pages artifacts (~23 MB each) accumulate every push — we keep only 2.

on:
  schedule:
    - cron: '0 5 * * *'   # Daily at 5:00 AM UTC
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: write
      contents: read

    steps:
      - name: Delete expired artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "## Artifact Cleanup Report" >> $GITHUB_STEP_SUMMARY
          echo "**Repo**: $REPO | **Date**: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY

          BEFORE=$(gh api "repos/$REPO/actions/artifacts" --jq '.total_count' 2>/dev/null || echo 0)

          PAGE=1
          while true; do
            ARTS=$(gh api "repos/$REPO/actions/artifacts?per_page=100&page=$PAGE" 2>/dev/null || echo '{"artifacts":[]}')
            COUNT=$(echo "$ARTS" | jq '.artifacts | length')
            [ "$COUNT" -eq 0 ] && break
            echo "$ARTS" | jq -c '.artifacts[] | select(.expired == true) | .id' | while read -r AID; do
              gh api --method DELETE "repos/$REPO/actions/artifacts/$AID" 2>/dev/null && echo "Deleted $AID"
            done
            PAGE=$((PAGE + 1))
            [ "$COUNT" -lt 100 ] && break
          done

          AFTER=$(gh api "repos/$REPO/actions/artifacts" --jq '.total_count' 2>/dev/null || echo 0)
          echo "- Before: $BEFORE  After: $AFTER  Cleaned: $((BEFORE - AFTER))" >> $GITHUB_STEP_SUMMARY

      - name: Purge stale github-pages artifacts (keep only latest 2)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # github-pages artifacts accumulate with every push (~23 MB each).
          # Keep only the 2 most recent; delete ALL older ones (expired or not).
          echo "### github-pages artifact purge" >> $GITHUB_STEP_SUMMARY
          ALL_PAGES=$(gh api "repos/$REPO/actions/artifacts?per_page=100&name=github-pages" \
            --jq '[.artifacts[] | {id:.id, created:.created_at, size:.size_in_bytes}] | sort_by(.created) | reverse' 2>/dev/null || echo '[]')
          TOTAL=$(echo "$ALL_PAGES" | jq 'length')
          TOTAL_MB=$(echo "$ALL_PAGES" | jq '[.[].size] | add // 0 | . / 1048576 | floor')
          echo "github-pages artifacts found: $TOTAL (~${TOTAL_MB} MB total)" >> $GITHUB_STEP_SUMMARY
          if [ "$TOTAL" -gt 2 ]; then
            TO_DELETE=$((TOTAL - 2))
            DELETED=0
            FREED_BYTES=0
            while IFS= read -r row; do
              AID=$(echo "$row" | jq -r '.id')
              SZ=$(echo "$row" | jq -r '.size')
              gh api --method DELETE "repos/$REPO/actions/artifacts/$AID" 2>/dev/null \
                && DELETED=$((DELETED + 1)) \
                && FREED_BYTES=$((FREED_BYTES + SZ)) \
                && echo "  Deleted artifact $AID ($(( SZ / 1048576 )) MB)" >> $GITHUB_STEP_SUMMARY
            done < <(echo "$ALL_PAGES" | jq -c '.[2:][]')
            FREED_MB=$((FREED_BYTES / 1048576))
            echo "- Kept 2 latest; purged $DELETED stale artifacts (~${FREED_MB} MB freed)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Only $TOTAL artifact(s) present — nothing to purge (threshold: >2)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Workflow run count audit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          TOTAL=$(gh api "repos/$REPO/actions/runs?per_page=1" --jq '.total_count' 2>/dev/null || echo 0)
          echo "Total workflow runs: $TOTAL" >> $GITHUB_STEP_SUMMARY
          if [ "$TOTAL" -gt 3000 ]; then
            echo "::warning::$REPO has $TOTAL workflow runs. Consider further reducing automation frequency."
            echo "⚠ **WARNING**: $TOTAL runs may be contributing to Offbeat-Inc org storage if this repo ever lived there." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Storage tips reminder
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Required: Fix Offbeat-Inc Org Storage" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to: https://github.com/organizations/Offbeat-Inc/settings/actions" >> $GITHUB_STEP_SUMMARY
          echo "2. Set **Artifact and log retention** from 90 days → **7 days**" >> $GITHUB_STEP_SUMMARY
          echo "3. Check: https://github.com/organizations/Offbeat-Inc/settings/billing for storage breakdown" >> $GITHUB_STEP_SUMMARY
          echo "4. Delete any GitHub Packages at: https://github.com/orgs/Offbeat-Inc/packages" >> $GITHUB_STEP_SUMMARY
